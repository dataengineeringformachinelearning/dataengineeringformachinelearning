name: 30-60-90 Automation Schedule

on:
  schedule:
    # 30-Day Automation: Security & Dependency Review
    # Runs on the 1st of every month
    - cron: "0 0 1 * *"

    # 60-Day Automation: Infrastructure & Telemetry Health Check
    # Runs on the 1st of every even month (Feb, Apr, Jun, etc.)
    - cron: "20 0 1 2-12/2 *"

    # 90-Day Automation: Full System Audit & Performance Review
    # Runs on the 1st of every quarter (Jan, Apr, Jul, Oct)
    - cron: "40 0 1 1,4,7,10 *"

  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: 30-60-90-automation-${{ github.event.schedule || github.run_id }}
  cancel-in-progress: false

jobs:
  automation-30-day:
    name: 30-Day Security & Dependency Cycle
    if: github.event.schedule == '0 0 1 * *' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: "22"
          cache: npm
      - uses: astral-sh/setup-uv@v6
      - name: Security Scan (Semgrep)
        run: |
          uvx semgrep scan --config auto --error
      - name: Dependency Audit
        run: |
          npm ci --legacy-peer-deps
          npm audit --audit-level=high --omit=dev
          uv lock --check

  automation-60-day:
    name: 60-Day Infrastructure & Telemetry Health Cycle
    if: github.event.schedule == '20 0 1 2-12/2 *' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v6
      - name: Validate Railway service catalog
        run: python -m json.tool infrastructure/railway/services.json >/dev/null
      - name: Verify production HTTP surfaces
        env:
          ORIGIN_URLS: >-
            https://demldotcom.web.app/
            https://deml-ui.web.app/
          EDGE_URLS: >-
            https://dataengineeringformachinelearning.com/
            https://deml.app/
            https://backend.deml.app/api/v1/system-status/health
        run: |
          for url in $ORIGIN_URLS; do
            echo "Checking deployment origin ${url}"
            curl --fail --location --silent --show-error \
              --retry 3 --retry-all-errors --connect-timeout 10 --max-time 30 \
              --user-agent "Mozilla/5.0 (compatible; DEML-Deployment-Monitor/1.0)" \
              --output /dev/null "$url"
          done
          for url in $EDGE_URLS; do
            echo "Checking protected edge ${url}"
            status="$(curl --location --silent --show-error \
              --retry 3 --retry-all-errors --connect-timeout 10 --max-time 30 \
              --user-agent "Mozilla/5.0 (compatible; DEML-Deployment-Monitor/1.0)" \
              --output /dev/null --write-out '%{http_code}' "$url")"
            case "$status" in
              2??|3??|403) ;;
              *) echo "Unexpected HTTP ${status} from ${url}" >&2; exit 1 ;;
            esac
          done
      - name: Verify Hugging Face model freshness
        env:
          HF_MODEL_REPO_ID: ${{ vars.HF_MODEL_REPO_ID }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          test -n "$HF_MODEL_REPO_ID" || { echo "HF_MODEL_REPO_ID is not configured" >&2; exit 1; }
          uv run --locked python scripts/verify_huggingface_models.py "$HF_MODEL_REPO_ID" --max-age-hours 36

  automation-90-day:
    name: 90-Day Performance & Audit Cycle
    if: github.event.schedule == '40 0 1 1,4,7,10 *' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: "22"
          cache: npm
      - uses: astral-sh/setup-uv@v6
      - name: Frontend Performance Audit
        run: |
          npm ci --legacy-peer-deps
          npm run build:viking-ui:package
          npm run build --workspace frontend
      - name: Backend Static Analysis
        run: uvx ruff check backend
