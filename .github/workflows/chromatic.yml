name: Viking-UI Storybook Visual Regression

on:
  pull_request:
    paths:
      - "packages/viking-ui/**"
      - ".github/workflows/chromatic.yml"
  workflow_dispatch:

jobs:
  chromatic-viking-ui:
    name: Run Chromatic on Storybook stories
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm

      - name: Install workspace dependencies
        run: npm ci --legacy-peer-deps

      - name: Isolate Storybook's supported Vite toolchain
        run: npm ci --legacy-peer-deps --prefix packages/viking-ui

      - name: Build Viking-UI Storybook
        run: npm run build-storybook --prefix packages/viking-ui

      - name: Publish Chromatic snapshots
        env:
          CHROMATIC_PROJECT_TOKEN: ${{ secrets.CHROMATIC_PROJECT_TOKEN }}
        run: |
          npx chromatic \
            --project-token "$CHROMATIC_PROJECT_TOKEN" \
            --storybook-build-dir packages/viking-ui/storybook-static \
            --exit-zero-on-changes
