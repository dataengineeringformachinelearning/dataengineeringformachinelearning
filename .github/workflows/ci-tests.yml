# Continuous integration — backend pytest + frontend vitest + Rust data plane
# Cursor - Grok 4.3 (2026-06-30): automated test matrix for PRs and main.

name: CI Tests

on:
  push:
    branches:
      - main
    paths:
      - "backend/**"
      - "frontend/**"
      - "marketing/package.json"
      - "marketing/package-lock.json"
      - "package.json"
      - "package-lock.json"
      - "packages/viking-ui/**"
      - "viking-ui-docs/**"
      - "scripts/**"
      - "rust/**"
      - ".github/workflows/ci-tests.yml"
  pull_request:
    paths:
      - "backend/**"
      - "frontend/**"
      - "marketing/package.json"
      - "marketing/package-lock.json"
      - "package.json"
      - "package-lock.json"
      - "packages/viking-ui/**"
      - "viking-ui-docs/**"
      - "scripts/**"
      - "rust/**"
      - ".github/workflows/ci-tests.yml"
  workflow_dispatch:

jobs:
  viking-ui-version-contract:
    name: Viking-UI version contract
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: "24"

      - name: Verify manifests, lockfiles, and public copy
        run: npm run check:viking-ui:version

  rust-data-plane:
    name: Rust data plane
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: rust
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Install native build dependencies
        run: sudo apt-get update && sudo apt-get install -y cmake libcurl4-openssl-dev libsasl2-dev libssl-dev pkg-config

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy,rustfmt

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run tests
        run: cargo test --workspace

      - name: Run Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

  backend-pytest:
    name: Backend (pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run pytest
        env:
          DATABASE_URL: "sqlite:///:memory:"
        run: pytest --tb=short -q

  frontend-vitest:
    name: Frontend (vitest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build viking-ui (required by vitest)
        run: npm run build:viking-ui

      - name: Run vitest (app)
        run: npm test

      - name: Run vitest (viking-ui library)
        run: npm run test:viking-ui

  viking-ui-docs-build:
    name: Viking-UI Docs (build)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: |
            frontend/package-lock.json
            viking-ui-docs/package-lock.json

      - name: Install workspace dependencies
        run: npm ci --legacy-peer-deps

      - name: Build canonical Viking-UI package
        run: npm run build:viking-ui:package

      - name: Build Viking-UI docs site
        run: npm run build --prefix viking-ui-docs

      - name: Verify Firebase hosting output path
        run: test -f viking-ui-docs/dist/index.html
