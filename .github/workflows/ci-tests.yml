# Continuous integration — backend pytest + frontend vitest
# Cursor - Grok 4.3 (2026-06-30): automated test matrix for PRs and main.

name: CI Tests

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'
      - 'frontend/**'
      - 'viking-ui-docs/**'
      - 'scripts/**'
      - '.github/workflows/ci-tests.yml'
  pull_request:
    paths:
      - 'backend/**'
      - 'frontend/**'
      - 'viking-ui-docs/**'
      - 'scripts/**'
      - '.github/workflows/ci-tests.yml'
  workflow_dispatch:

jobs:
  backend-pytest:
    name: Backend (pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run pytest
        env:
          DATABASE_URL: "sqlite:///:memory:"
        run: pytest --tb=short -q

  frontend-vitest:
    name: Frontend (vitest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build viking-ui (required by vitest)
        run: npm run build:viking-ui

      - name: Run vitest (app)
        run: npm test

      - name: Run vitest (viking-ui library)
        run: npm run test:viking-ui

  viking-ui-docs-build:
    name: Viking-UI Docs (build)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: |
            frontend/package-lock.json
            viking-ui-docs/package-lock.json

      - name: Install frontend dependencies
        run: npm ci --legacy-peer-deps --prefix frontend

      - name: Build Viking-UI library
        run: npm run build:viking-ui --prefix frontend

      - name: Install and build Viking-UI docs site
        run: |
          npm ci --legacy-peer-deps --prefix viking-ui-docs
          npm run build --prefix viking-ui-docs

      - name: Verify Firebase hosting output path
        run: test -f viking-ui-docs/dist/browser/index.html
