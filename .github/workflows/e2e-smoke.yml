name: E2E Smoke Tests

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'frontend/cypress/**'
      - 'frontend/cypress.config.mjs'
      - 'frontend/src/**'
      - 'viking-ui-docs/**'
      - '.github/workflows/e2e-smoke.yml'

jobs:
  cypress-smoke:
    name: Cypress smoke (build + run)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: |
            frontend/package-lock.json
            viking-ui-docs/package-lock.json

      - name: Install workspace dependencies
        run: npm ci --legacy-peer-deps --prefix ..

      - name: Build canonical Viking-UI package
        run: npm run build:viking-ui:package --prefix ..

      - name: Build frontend
        run: npm run build

      - name: Build marketing and Viking-UI docs
        run: |
          npm run build --prefix ../marketing
          npm run build --prefix ../viking-ui-docs

      - name: Start application, marketing, and docs servers
        run: |
          npm run serve:ssr:frontend &
          npm run preview --prefix ../marketing -- --host 127.0.0.1 &
          npm run preview --prefix ../viking-ui-docs -- --host 127.0.0.1 &
          for i in $(seq 1 60); do
            if curl -sf http://localhost:4000/ > /dev/null 2>&1 \
              && curl -sf http://localhost:4321/ > /dev/null 2>&1 \
              && curl -sf http://localhost:4300/ > /dev/null 2>&1; then
              echo "All smoke-test servers ready"
              exit 0
            fi
            sleep 2
          done
          echo "One or more smoke-test servers failed to start"
          exit 1

      - name: Run Cypress smoke tests
        env:
          CYPRESS_baseUrl: http://localhost:4000
        run: npm run test:e2e
