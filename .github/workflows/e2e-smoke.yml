name: E2E Smoke Tests

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'frontend/cypress/**'
      - 'frontend/cypress.config.ts'
      - 'frontend/src/**'
      - 'viking-ui-docs/**'
      - '.github/workflows/e2e-smoke.yml'

jobs:
  cypress-smoke:
    name: Cypress smoke (build + run)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: |
            frontend/package-lock.json
            viking-ui-docs/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build viking-ui and frontend
        run: npm run build

      - name: Start SSR server
        run: |
          npm run serve:ssr:frontend &
          for i in $(seq 1 60); do
            if curl -sf http://localhost:4000/ > /dev/null 2>&1; then
              echo "SSR server ready"
              exit 0
            fi
            sleep 2
          done
          echo "SSR server failed to start"
          exit 1

      - name: Run Cypress smoke tests
        env:
          CYPRESS_baseUrl: http://localhost:4000
        run: npm run test:e2e

      - name: Build Viking-UI docs site
        run: |
          npm ci --legacy-peer-deps --prefix ../viking-ui-docs
          npm run build --prefix ../viking-ui-docs
