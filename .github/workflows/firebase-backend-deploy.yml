# Deploy Firebase Firestore rules for DEML.
#
# DEML no longer ships Cloud Run functions: authentication/authorization and
# all data storage & retrieval run through the Django control plane and FORJD
# (sealed ingest, projections, analytics, ML) via tenant-bound `fjsvc_` tokens.
# Firestore rules remain only for the optional Firebase-adjacent user documents.
#
# Triggers on Firestore rule or Firebase config changes on main. Manual dispatch
# is also supported.
#
# Uses the FIREBASE_SERVICE_ACCOUNT_DEMLDOTCOM secret shared with hosting workflows.

name: Deploy Firebase Firestore Rules

on:
  push:
    branches:
      - main
    paths:
      - "firestore.rules"
      - "firebase.json"
      - ".github/workflows/firebase-backend-deploy.yml"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    concurrency:
      group: firebase-firestore-production
      cancel-in-progress: false
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup Node.js 22
        uses: actions/setup-node@v7
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: "package-lock.json"

      - name: Authenticate to Google Cloud / Firebase
        id: auth
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_DEMLDOTCOM }}
          create_credentials_file: true

      - name: Setup Google Cloud CLI
        uses: google-github-actions/setup-gcloud@v3

      - name: Verify lockfile-pinned Firebase CLI
        run: npx --no-install firebase --version

      - name: Deploy Firestore rules and indexes
        run: npx --no-install firebase deploy --only firestore --project demldotcom --non-interactive
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ steps.auth.outputs.credentials_file_path }}

      - name: Deployment summary
        run: |
          echo "✅ Firestore rules deployed to project: demldotcom"
          echo "   - Auth / data storage & retrieval: Django control plane + FORJD"
          echo "   - Sealed ingest / projections / ML: FORJD (https://backend.forjd.co)"

  purge-cloudflare-cache:
    needs: deploy
    uses: ./.github/workflows/purge-cloudflare-cache.yml
    secrets:
      CLOUDFLARE_TOKEN: ${{ secrets.CLOUDFLARE_TOKEN }}
      CLOUDFLARE_ZONE_ID_DEML_MARKETING: ${{ secrets.CLOUDFLARE_ZONE_ID_DEML_MARKETING }}
      CLOUDFLARE_ZONE_ID_DEML_APP: ${{ secrets.CLOUDFLARE_ZONE_ID_DEML_APP }}
