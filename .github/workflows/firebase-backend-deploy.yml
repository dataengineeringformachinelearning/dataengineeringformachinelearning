# Deploy Firebase Backend components (Cloud Run function + Firestore rules).
# ingestEvent is retired from the local data plane (FORJD owns sealed ingest).
# Deploy keeps Firestore rules current and clears any legacy Redpanda env on Cloud Run.
#
# Triggers on changes to functions code, firestore rules, or firebase config on main.
# Also supports manual dispatch.
#
# Uses the same FIREBASE_SERVICE_ACCOUNT_DEMLDOTCOM secret as the hosting workflows.

name: Deploy Firebase Backend (Cloud Run + Firestore)

on:
  push:
    branches:
      - main
    paths:
      - "functions/**"
      - "package.json"
      - "package-lock.json"
      - "firestore.rules"
      - "firebase.json"
      - ".github/workflows/firebase-backend-deploy.yml"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    concurrency:
      group: firebase-backend-production
      cancel-in-progress: false
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup Node.js 22 for the Functions runtime
        uses: actions/setup-node@v7
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: "package-lock.json"

      - name: Install, test, and build Functions
        run: |
          npm ci --legacy-peer-deps --workspace functions
          npm test --workspace functions
          npm run build --workspace functions

      - name: Authenticate to Google Cloud / Firebase
        id: auth
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_DEMLDOTCOM }}
          create_credentials_file: true

      - name: Setup Google Cloud CLI
        uses: google-github-actions/setup-gcloud@v3

      - name: Verify lockfile-pinned Firebase CLI
        run: npx --no-install firebase --version

      - name: Deploy Firestore rules and indexes
        run: npx --no-install firebase deploy --only firestore --project demldotcom --non-interactive
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ steps.auth.outputs.credentials_file_path }}

      - name: Deploy ingestEvent Cloud Run function (retired; clear legacy data-plane env)
        shell: bash
        run: |
          # Always clear Redpanda / DEML_INTERNODE secrets — local brokers are retired.
          # Function code fails closed; sealed ingest belongs on FORJD (fjsvc_).
          gcloud run deploy ingestevent \
            --source=functions \
            --function=ingestEvent \
            --region=us-east4 \
            --project=demldotcom \
            --service-account=demldotcom@appspot.gserviceaccount.com \
            --build-service-account=projects/demldotcom/serviceAccounts/870072971206-compute@developer.gserviceaccount.com \
            --base-image=us-east4-docker.pkg.dev/serverless-runtimes/google-22-full/runtimes/nodejs22 \
            --clear-env-vars \
            --quiet

      - name: Verify deployed callable function
        shell: bash
        run: |
          read -r latest_created latest_ready < <(
            gcloud run services describe ingestevent \
              --region=us-east4 \
              --project=demldotcom \
              --format="value(status.latestCreatedRevisionName,status.latestReadyRevisionName)"
          )
          test -n "${latest_created}"
          test "${latest_created}" = "${latest_ready}"

          service_url=$(
            gcloud run services describe ingestevent \
              --region=us-east4 \
              --project=demldotcom \
              --format="value(status.url)"
          )
          response_file=$(mktemp)
          status=$(curl --silent --show-error \
            --output "${response_file}" \
            --write-out "%{http_code}" \
            --request POST \
            --header "Content-Type: application/json" \
            --data '{"data":{}}' \
            "${service_url}")
          test "${status}" = "401"
          node -e '
            const fs = require("node:fs");
            const response = JSON.parse(fs.readFileSync(process.argv[1], "utf8"));
            if (response.error?.status !== "UNAUTHENTICATED") process.exit(1);
          ' "${response_file}"
          echo "Verified ready revision ${latest_ready} and callable authentication boundary"

      - name: Deployment summary
        run: |
          echo "✅ Cloud Run function and Firestore rules deployed to project: demldotcom"
          echo "   - Cloud Run function: ingestEvent (retired data-plane path; env cleared)"
          echo "   - Firestore: rules from firestore.rules for the named deml database"
          echo "   - Sealed ingest / projections / ML: FORJD only (https://backend.forjd.co)"

  purge-cloudflare-cache:
    needs: deploy
    uses: ./.github/workflows/purge-cloudflare-cache.yml
    secrets:
      CLOUDFLARE_TOKEN: ${{ secrets.CLOUDFLARE_TOKEN }}
      CLOUDFLARE_ZONE_ID_DEML_MARKETING: ${{ secrets.CLOUDFLARE_ZONE_ID_DEML_MARKETING }}
      CLOUDFLARE_ZONE_ID_DEML_APP: ${{ secrets.CLOUDFLARE_ZONE_ID_DEML_APP }}
