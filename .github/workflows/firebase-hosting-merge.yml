# Deploy marketing site to Firebase Hosting on merge to main.
# Uses Firebase CLI directly so identical rebuilds do not fail the workflow.

name: Deploy to Firebase Hosting on merge

on:
  push:
    branches:
      - main
    paths:
      - "marketing/**"
      - "packages/viking-ui/**"
      - "package.json"
      - "package-lock.json"
      - "firebase.json"
      - ".github/workflows/firebase-hosting-merge.yml"
  workflow_dispatch:

concurrency:
  group: firebase-marketing-production
  cancel-in-progress: false

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24.15.0"
          cache: npm
          cache-dependency-path: |
            package-lock.json
            marketing/package-lock.json

      - name: Install workspace dependencies
        run: npm ci --legacy-peer-deps

      - name: Build canonical Viking-UI package
        run: npm run build:viking-ui:package

      - name: Build marketing site
        run: npm run build --prefix marketing

      - name: Authenticate to Google Cloud / Firebase
        id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_DEMLDOTCOM }}
          create_credentials_file: true

      - name: Verify lockfile-pinned Firebase CLI
        run: npx --no-install firebase --version

      - name: Deploy marketing hosting target
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ steps.auth.outputs.credentials_file_path }}
        run: |
          set +e
          OUTPUT=$(npx --no-install firebase deploy --only hosting:marketing --project demldotcom --non-interactive 2>&1)
          STATUS=$?
          echo "$OUTPUT"
          if [ "$STATUS" -eq 0 ]; then
            exit 0
          fi
          if echo "$OUTPUT" | grep -q "is the current active version"; then
            echo "Hosting is already on the active version; treating deploy as success."
            exit 0
          fi
          exit "$STATUS"

  purge-cloudflare-cache:
    needs: build_and_deploy
    uses: ./.github/workflows/purge-cloudflare-cache.yml
    secrets:
      CLOUDFLARE_TOKEN: ${{ secrets.CLOUDFLARE_TOKEN }}
      CLOUDFLARE_ZONE_ID_DEML_MARKETING: ${{ secrets.CLOUDFLARE_ZONE_ID_DEML_MARKETING }}
      CLOUDFLARE_ZONE_ID_DEML_APP: ${{ secrets.CLOUDFLARE_ZONE_ID_DEML_APP }}
