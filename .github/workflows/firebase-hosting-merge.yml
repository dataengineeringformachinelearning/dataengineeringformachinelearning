# Deploy marketing site to Firebase Hosting on merge to main.
# Uses Firebase CLI directly so identical rebuilds do not fail the workflow.

name: Deploy to Firebase Hosting on merge

on:
  push:
    branches:
      - main
    paths:
      - 'marketing/**'
      - 'firebase.json'
      - '.github/workflows/firebase-hosting-merge.yml'
  workflow_dispatch:

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: marketing/package-lock.json

      - name: Build marketing site
        run: npm ci --prefix marketing && npm run build --prefix marketing

      - name: Authenticate to Google Cloud / Firebase
        id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_DEMLDOTCOM }}
          create_credentials_file: true

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Deploy marketing hosting target
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ steps.auth.outputs.credentials_file_path }}
        run: |
          set +e
          OUTPUT=$(firebase deploy --only hosting:marketing --project demldotcom --non-interactive 2>&1)
          STATUS=$?
          echo "$OUTPUT"
          if [ "$STATUS" -eq 0 ]; then
            exit 0
          fi
          if echo "$OUTPUT" | grep -q "is the current active version"; then
            echo "Hosting is already on the active version; treating deploy as success."
            exit 0
          fi
          exit "$STATUS"
