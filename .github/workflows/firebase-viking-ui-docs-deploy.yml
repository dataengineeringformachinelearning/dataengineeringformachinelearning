# Manual fallback deployment for the Viking-UI documentation site.
# Serves the Viking-UI component library docs at ui.dataengineeringformachinelearning.com
# (configure custom domain in Firebase console after first deploy).

name: Deploy Viking-UI Docs

on:
  workflow_dispatch:

concurrency:
  group: viking-ui-showcase-production
  cancel-in-progress: false

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: viking-ui-docs/package-lock.json

      - name: Sync design-system assets from canonical package
        run: |
          npm ci --legacy-peer-deps
          npm run build:viking-ui:package
          npm run sync:design-system

      - name: Install and build Viking-UI docs site (Astro + static CSS)
        run: |
          npm ci --prefix viking-ui-docs --legacy-peer-deps
          npm run build --prefix viking-ui-docs

      - name: Authenticate to Google Cloud / Firebase
        id: auth
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_DEML_UI }}
          create_credentials_file: true

      - name: Verify lockfile-pinned Firebase CLI
        run: npx --no-install firebase --version

      - name: Deploy Viking-UI docs hosting target
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ steps.auth.outputs.credentials_file_path }}
        run: |
          set +e
          OUTPUT=$(npx --no-install firebase deploy --only hosting:deml-ui --project deml-ui --non-interactive 2>&1)
          STATUS=$?
          echo "$OUTPUT"
          if [ "$STATUS" -eq 0 ]; then
            exit 0
          fi
          if echo "$OUTPUT" | grep -q "is the current active version"; then
            echo "Hosting is already on the active version; treating deploy as success."
            exit 0
          fi
          exit "$STATUS"
