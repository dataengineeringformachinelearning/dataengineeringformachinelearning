name: Sync frontend mirror to Hugging Face Space

on:
  push:
    branches:
      - main
    paths:
      - "README.md"
      - "WHITEPAPER.md"
      - "BOOK.md"
      - "THEME.md"
      - "frontend/**"
      - "scripts/sync_huggingface_space.py"
      - ".github/workflows/huggingface-space.yml"
  workflow_dispatch:

concurrency:
  group: hugging-face-space-production
  cancel-in-progress: true

jobs:
  sync-to-hub:
    name: Upload frontend mirror with Hugging Face Xet
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository and Git LFS assets
        uses: actions/checkout@v7
        with:
          fetch-depth: 1
          lfs: true

      - name: Set up uv
        uses: astral-sh/setup-uv@v6

      - name: Validate Hugging Face credentials
        env:
          HF_SPACE_REPO: ${{ secrets.HF_SPACE_REPO }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          test -n "$HF_TOKEN" || { echo "HF_TOKEN is not configured" >&2; exit 1; }
          test -n "$HF_SPACE_REPO" || { echo "HF_SPACE_REPO is not configured" >&2; exit 1; }
          uvx --from huggingface_hub==1.23.0 hf auth whoami --format json >/dev/null

      - name: Upload frontend mirror to Hugging Face Hub
        env:
          HF_SPACE_REPO: ${{ secrets.HF_SPACE_REPO }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          uv run --no-project --with huggingface_hub==1.23.0 \
            python scripts/sync_huggingface_space.py

      - name: Report Space runtime state
        env:
          HF_SPACE_REPO: ${{ secrets.HF_SPACE_REPO }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          runtime_stage="$(curl --fail --silent --show-error \
            --header "Authorization: Bearer ${HF_TOKEN}" \
            "https://huggingface.co/api/spaces/${HF_SPACE_REPO}" | jq -r '.runtime.stage // "UNKNOWN"')"
          echo "Hugging Face Space runtime stage: ${runtime_stage}" >> "$GITHUB_STEP_SUMMARY"
          if [ "$runtime_stage" = "CONFIG_ERROR" ]; then
            echo "::warning::The Space source is synchronized, but Hugging Face reports a runtime configuration or account-credit error."
          fi
