# Publish DEML Python packages to PyPI
# Uses PyPI Trusted Publishing (OpenID Connect) - no token required
name: Publish DEML Python Packages

on:
  push:
    branches:
      - main
    paths:
      - 'packages/deml-*/**'
      - 'packages/deml-*/pyproject.toml'
  workflow_dispatch:
    inputs:
      package:
        description: "Package to publish (e.g., deml-crypto)"
        required: false
        type: string

permissions:
  contents: read
  id-token: write  # Required for PyPI Trusted Publishing

jobs:
  publish:
    name: Build and publish to PyPI
    runs-on: ubuntu-latest
    environment: pypi
    strategy:
      matrix:
        package: ["deml-crypto", "deml-event-client", "deml-rate-limit", "deml-storage"]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install build tools
        run: pip install build

      - name: Build package
        run: |
          cd "packages/${{ matrix.package }}"
          python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: "packages/${{ matrix.package }}/dist"

      - name: Summary
        run: |
          echo "Published ${{ matrix.package }} to PyPI"
