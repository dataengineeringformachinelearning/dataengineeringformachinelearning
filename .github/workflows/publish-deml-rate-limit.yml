# Publish deml-rate-limit to PyPI
# Uses PyPI Trusted Publishing (OpenID Connect) - no token required
name: Publish deml-rate-limit to PyPI

on:
  push:
    branches:
      - main
    paths:
      - 'packages/deml-rate-limit/**'
      - 'packages/deml-rate-limit/pyproject.toml'
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: Build and publish deml-rate-limit to PyPI
    runs-on: ubuntu-latest
    environment: pypi
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install build tools
        run: pip install build

      - name: Build package
        run: |
          cd "packages/deml-rate-limit"
          python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: "packages/deml-rate-limit/dist"
