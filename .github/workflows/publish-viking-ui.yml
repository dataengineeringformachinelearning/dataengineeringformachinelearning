# Auto-publish @dataengineeringformachinelearning/viking-ui to npm on release tags.
name: Publish Viking-UI

on:
  push:
    tags:
      - 'viking-ui-v*'
  pull_request:
    paths:
      - 'frontend/projects/viking-ui/**'
      - 'packages/deml-design-system/**'
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  verify:
    name: Build Viking-UI artifacts
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci --legacy-peer-deps
      - run: |
          npm run build:viking-ui
          npm run build:viking-ui-css
      - run: test -f dist/viking-ui/package.json && test -f dist/viking-ui-css/viking-ui.css

  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/viking-ui-v') || github.event_name == 'workflow_dispatch'
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build Viking-UI library and CSS bundle
        run: |
          npm run build:viking-ui
          npm run build:viking-ui-css

      - name: Publish to npm
        working-directory: frontend/dist/viking-ui
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public --provenance
