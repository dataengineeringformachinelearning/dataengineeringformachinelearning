name: Publish Viking-UI

on:
  push:
    branches:
      - main
    paths:
      - 'packages/viking-ui/**'
      - 'frontend/projects/viking-ui/src/**'
      - 'packages/viking-ui/src/**'
      - '.changeset/**'
      - 'package-lock.json'
      - 'package.json'
      - '.github/workflows/publish-viking-ui.yml'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  id-token: write
  deployments: write

concurrency:
  group: viking-ui-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Release Viking-UI package, Storybook, and showcase
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: package-lock.json
          registry-url: 'https://registry.npmjs.org'

      - name: Install workspace dependencies
        run: npm ci --legacy-peer-deps

      - name: Security gate (dependency audit)
        run: npm audit --audit-level=high

      - name: Build canonical Viking-UI package
        run: npm run build:viking-ui:package

      - name: Apply Changesets versioning and publish package
        id: changesets
        uses: changesets/action@v1
        with:
          version: npm run version:viking-ui
          publish: npm run publish:viking-ui
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Build Storybook and publish to Chromatic
        if: steps.changesets.outputs.published == 'true' && secrets.CHROMATIC_PROJECT_TOKEN != ''
        env:
          CHROMATIC_PROJECT_TOKEN: ${{ secrets.CHROMATIC_PROJECT_TOKEN }}
        run: |
          npm run build-storybook --workspace @dataengineeringformachinelearning/viking-ui
          npx chromatic \
            --project-token "$CHROMATIC_PROJECT_TOKEN" \
            --storybook-build-dir packages/viking-ui/storybook-static \
            --exit-zero-on-changes

      - name: Skip Storybook publish
        if: steps.changesets.outputs.published == 'true' && secrets.CHROMATIC_PROJECT_TOKEN == ''
        run: echo "CHROMATIC_PROJECT_TOKEN is not set; skipping Storybook publish."

      - name: Sync canonical design-system assets
        if: steps.changesets.outputs.published == 'true'
        run: npm run sync:design-system

      - name: Build Viking-UI showcase
        if: steps.changesets.outputs.published == 'true'
        run: npm run build-viking-ui-docs

      - name: Authenticate to Firebase
        if: steps.changesets.outputs.published == 'true' && secrets.FIREBASE_SERVICE_ACCOUNT_DEML_UI != ''
        id: firebase-auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_DEML_UI }}
          create_credentials_file: true

      - name: Deploy UI showcase
        if: steps.changesets.outputs.published == 'true' && secrets.FIREBASE_SERVICE_ACCOUNT_DEML_UI != ''
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ steps.firebase-auth.outputs.credentials_file_path }}
        run: |
          npm install -g firebase-tools
          firebase deploy --only hosting:deml-ui --project deml-ui --non-interactive

      - name: Skip showcase deploy
        if: steps.changesets.outputs.published == 'true' && secrets.FIREBASE_SERVICE_ACCOUNT_DEML_UI == ''
        run: echo "FIREBASE_SERVICE_ACCOUNT_DEML_UI is not set; showcase deploy skipped."
