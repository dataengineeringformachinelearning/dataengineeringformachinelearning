# Auto-publish @dataengineeringformachinelearning/viking-ui to npm on release tags.
name: Publish Viking-UI

on:
  push:
    tags:
      - 'viking-ui-v*'
  workflow_dispatch:

jobs:
  publish:
    name: Build and publish Viking-UI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build Viking-UI library
        run: npm run build:viking-ui

      - name: Publish to npm
        working-directory: frontend/dist/viking-ui
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public --provenance
