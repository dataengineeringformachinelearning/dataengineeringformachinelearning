# Purge Cloudflare cache for all DEML domains after deploy.
#
# Zones:
#   - dataengineeringformachinelearning.com  (marketing site)
#   - deml.app                               (frontend + backend.deml.app)
#
# Required GitHub Secrets:
#   CLOUDFLARE_TOKEN                  – API token with "Zone.Cache Purge" permission for both zones
#   CLOUDFLARE_ZONE_ID_DEML_MARKETING – Zone ID for dataengineeringformachinelearning.com
#   CLOUDFLARE_ZONE_ID_DEML_APP       – Zone ID for deml.app

name: Purge Cloudflare Cache

on:
  # Called by deploy workflows after successful deploy
  workflow_call:
    secrets:
      CLOUDFLARE_TOKEN:
        required: true
      CLOUDFLARE_ZONE_ID_DEML_MARKETING:
        required: true
      CLOUDFLARE_ZONE_ID_DEML_APP:
        required: true
  # Manual trigger for ad-hoc cache busting
  workflow_dispatch:

jobs:
  purge-cache:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - zone_secret: CLOUDFLARE_ZONE_ID_DEML_MARKETING  # pragma: allowlist secret
            domain: dataengineeringformachinelearning.com
          - zone_secret: CLOUDFLARE_ZONE_ID_DEML_APP  # pragma: allowlist secret
            domain: deml.app
    steps:
      - name: Purge entire cache for ${{ matrix.domain }}
        env:
          CF_TOKEN: ${{ matrix.zone_secret == 'CLOUDFLARE_ZONE_ID_DEML_MARKETING' && secrets.CLOUDFLARE_ZONE_ID_DEML_MARKETING || secrets.CLOUDFLARE_ZONE_ID_DEML_APP }}  # pragma: allowlist secret
          CF_API_TOKEN: ${{ secrets.CLOUDFLARE_TOKEN }}
        run: |
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            "https://api.cloudflare.com/client/v4/zones/${CF_TOKEN}/purge_cache" \
            -H "Authorization: Bearer ${CF_API_TOKEN}" \
            -H "Content-Type: application/json" \
            --data '{"purge_everything":true}')

          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | sed '$d')

          echo "Response (${{ matrix.domain }}): ${BODY}"

          if [ "$HTTP_CODE" -ne 200 ]; then
            echo "::error::Cloudflare cache purge failed for ${{ matrix.domain }} (HTTP ${HTTP_CODE})"
            exit 1
          fi

          SUCCESS=$(echo "$BODY" | jq -r '.success')
          if [ "$SUCCESS" != "true" ]; then
            echo "::error::Cloudflare API returned success=false for ${{ matrix.domain }}"
            exit 1
          fi

          echo "✅ Cache purged for ${{ matrix.domain }}"
