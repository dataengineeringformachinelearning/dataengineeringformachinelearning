# Lint, format, secrets, and SAST — mirrors local pre-commit + pre-push stages.
name: Quality Gates

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  quality:
    name: Pre-commit + pre-push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - uses: actions/setup-node@v7
        with:
          node-version: '24'

      - name: Install Trivy
        run: |
          curl -fsSL https://aquasecurity.github.io/trivy-repo/deb/public.key \
            | gpg --dearmor \
            | sudo tee /usr/share/keyrings/trivy.gpg > /dev/null
          echo "deb [signed-by=/usr/share/keyrings/trivy.gpg] https://aquasecurity.github.io/trivy-repo/deb generic main" \
            | sudo tee /etc/apt/sources.list.d/trivy.list
          sudo apt-get update
          sudo apt-get install -y trivy

      - name: Install uv
        run: pip install uv

      - name: Install workspace dependencies (theme + axe checks)
        run: npm ci --legacy-peer-deps

      - name: Install backend deps (migration linter)
        run: |
          python -m venv backend/.venv
          backend/.venv/bin/pip install -r backend/requirements.txt

      - name: Install pre-commit hooks
        run: uvx pre-commit install --install-hooks --hook-type pre-commit --hook-type pre-push

      - name: Run fast quality gates (pre-commit stage)
        run: uvx pre-commit run --all-files --hook-stage pre-commit

      - name: Run security gates (pre-push stage)
        run: uvx pre-commit run --all-files --hook-stage pre-push

      - name: Run manual gates (theme dry-run)
        run: uvx pre-commit run cleanup-theme --all-files --hook-stage manual
