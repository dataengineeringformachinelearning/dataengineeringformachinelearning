name: Viking-UI PR Quality Gates

on:
  pull_request:
    paths:
      - "packages/viking-ui/**"
      - "viking-ui-docs/**"
      - ".changeset/**"
      - "scripts/enforce-theme.js"
      - "scripts/run_axe.js"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/viking-ui-pr-gates.yml"
      - ".github/workflows/publish-viking-ui.yml"

permissions:
  contents: read
  pull-requests: write

jobs:
  dependency-review:
    name: Dependency review (security baseline)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v7
      - name: Run dependency review
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high

  quality-gates:
    name: Theme, accessibility, tests, visual regression, and security
    runs-on: ubuntu-latest
    env:
      CHROMATIC_PROJECT_TOKEN: ${{ secrets.CHROMATIC_PROJECT_TOKEN }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install workspace dependencies
        run: npm ci --legacy-peer-deps

      - name: Isolate Storybook's supported Vite toolchain
        run: npm ci --legacy-peer-deps --prefix packages/viking-ui

      - name: Run theme enforcement check
        run: node scripts/enforce-theme.js

      - name: Run Viking-UI unit test suite
        run: npm run test:viking-ui:package

      - name: Run dependency audit (high severity)
        run: npm audit --audit-level=high

      - name: Build Storybook
        run: npm run build-storybook --prefix packages/viking-ui

      - name: Run accessibility checks on Storybook output
        run: |
          STORYBOOK_HTML_LIST=$(mktemp)
          find packages/viking-ui/storybook-static -type f -name '*.html' -print0 > "$STORYBOOK_HTML_LIST"
          if [ -s "$STORYBOOK_HTML_LIST" ]; then
            xargs -0 node scripts/run_axe.js < "$STORYBOOK_HTML_LIST"
          else
            echo "No Storybook HTML files found, skipping axe checks."
          fi

      - name: Require Chromatic publication credentials
        run: test -n "$CHROMATIC_PROJECT_TOKEN"

      - name: Run visual regression in Chromatic
        run: |
          npx chromatic \
            --project-token "$CHROMATIC_PROJECT_TOKEN" \
            --storybook-build-dir packages/viking-ui/storybook-static \
            --exit-zero-on-changes
