exclude: '^(?:\.venv|backend/\.venv|frontend/node_modules)/'
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
        args: ["--maxkb=1000"]
        exclude: ^frontend/public/data-engineering-for-machine-learning\.mp4$

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.4.4
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v4.0.0-alpha.8
    hooks:
      - id: prettier
        files: \.(js|ts|css|html|json|md)$
        exclude: ^frontend/(public/llms-full.txt|src/assets/content/page.md)$
        additional_dependencies:
          - prettier@3.8.2

  - repo: local
    hooks:
      - id: semgrep
        name: Semgrep SAST Scan
        entry: uvx semgrep scan --error
        language: system
        pass_filenames: false
      - id: axe-core
        name: Accessibility Scan (axe-core)
        entry: node scripts/run_axe.js
        language: system
        files: \.(html)$
        pass_filenames: true
      - id: sync-content
        name: Sync BOOK.md to frontend files
        entry: python scripts/sync_content.py
        language: system
        files: ^(BOOK\.md|version\.txt)$
        pass_filenames: false
      - id: check-mobile-first
        name: Verify styles are mobile-first
        entry: node frontend/scripts/check_mobile_first.js
        language: system
        files: \.(css|scss)$
        pass_filenames: false
      - id: socket-scan
        name: Socket.dev Dependency Scan
        entry: bash -c 'if [ -z "$SOCKET_API_KEY" ]; then echo "Socket API key not set, skipping scan."; else npx -y socket ci; fi'
        language: system
        pass_filenames: false
      - id: checkov
        name: Checkov IaC Security Scan
        entry: uvx checkov -d terraform/ --framework terraform
        language: system
        pass_filenames: false
      - id: trivy
        name: Trivy Config Security Scan
        entry: trivy fs . --scanners config --severity HIGH,CRITICAL --exit-code 1 --quiet --skip-dirs .venv --skip-dirs backend/.venv --skip-dirs frontend/node_modules
        language: system
        pass_filenames: false
      - id: django-migration-linter
        name: Django Migration Linter
        entry: env DATABASE_URL=sqlite:// uv run python backend/manage.py lintmigrations --ignore-name 0018_endpoints_traffic_enrichment 0002_alter_endpoints_ip_address_statuspage_and_more 0005_statuspage_is_published 0004_remove_threatreport_user_and_more 0023_tenant_stripe_customer_id_and_more 0029_threatintelligence_threat_inte_ip_addr_03311d_idx_and_more
        language: system
        always_run: true
        pass_filenames: false

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.18.2
    hooks:
      - id: gitleaks
        exclude: ^\.secrets\.baseline$

  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args: ["--baseline", ".secrets.baseline"]
        exclude: 'package-lock\.json|frontend/src/app/bones/.*\.bones\.json|backend/templates/home\.html'
