repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
        args: ['--maxkb=1000']
        exclude: ^frontend/public/data-engineering-for-machine-learning\.mp4$


  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.4.4
    hooks:
      - id: ruff
        args: [ --fix ]
      - id: ruff-format

  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v4.0.0-alpha.8
    hooks:
      - id: prettier
        files: \.(js|ts|css|html|json|md)$
        exclude: ^frontend/(public/llms-full.txt|src/assets/content/page.md)$
        additional_dependencies:
          - prettier@3.8.2

  - repo: local
    hooks:
      - id: axe-core
        name: Accessibility Scan (axe-core)
        entry: node scripts/run_axe.js
        language: system
        files: \.(html)$
        pass_filenames: true
      - id: sync-content
        name: Sync README.md to frontend files
        entry: python scripts/sync_content.py
        language: system
        files: ^README\.md$
        pass_filenames: false
