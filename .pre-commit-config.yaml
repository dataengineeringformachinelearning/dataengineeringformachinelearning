# DEML quality gates — fast checks on commit, heavy scans on push.
# Install: uvx pre-commit install --hook-type pre-commit --hook-type pre-push
# Run all:  python scripts/deml_tooling.py quality --ci
# Run fast: python scripts/deml_tooling.py quality --fast
exclude: '^(?:\.venv|backend/\.venv|frontend/node_modules)/'

default_stages: [pre-commit]

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
        args: ['--maxkb=1000']
        exclude: ^frontend/public/data-engineering-for-machine-learning\.mp4$

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.4.4
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: local
    hooks:
      # --- Sync (only when sources change) ---
      - id: sync-content
        name: Sync BOOK.md / README / version to consumers
        entry: python scripts/sync_content.py
        language: system
        files: ^(BOOK\.md|README\.md|version\.txt|AGENTS\.md|scripts/build_search_index\.py)$
        pass_filenames: false

      - id: sync-design-system
        name: Sync design system package to consumers
        entry: python scripts/sync_design_system.py
        language: system
        files: ^(packages/viking-ui/src/styles/|packages/viking-ui/src/web/|packages/viking-ui/scripts/|viking-ui-docs/scripts/build-static-css\.mjs)
        pass_filenames: false
      - id: sync-site-drakkar
        name: Sync site drakkar JSON and Django partials
        entry: bash -c 'cd frontend && npm run build:site-drakkar && cd .. && python scripts/sync_widgets.py'
        language: system
        files: ^packages/viking-ui/src/lib/site-drakkar/|^frontend/scripts/build_site_drakkar\.mjs$|^frontend/src/assets/widgets/navbar\.js$
        pass_filenames: false
      - id: semgrep-css
        name: Semgrep CSS/SCSS Scan
        entry: uvx semgrep scan --error
        language: system
        files: \.(css|scss)$
        pass_filenames: false

      - id: axe-core
        name: Accessibility Scan (axe-core)
        entry: node scripts/run_axe.js
        language: system
        files: ^(packages/viking-ui|viking-ui-docs)/.*\.(html|astro)$
        exclude: ^backend/templates/swagger\.html$
        pass_filenames: true
        stages: [pre-commit]

      - id: cleanup-theme
        name: Viking-UI theme consistency (dry-run)
        entry: node scripts/enforce-theme.js
        language: system
        files: ^(frontend|marketing|backend|packages)/.*\.(scss|css|astro|html|ts|js|svg)$
        exclude: ^.*/(viking-ui|design-tokens|deml-components)\.css$
        pass_filenames: false
        stages: [pre-commit, manual]

      # --- Pre-push security & infra scans ---
      - id: semgrep-sast
        name: Semgrep SAST Scan
        entry: bash scripts/run_semgrep.sh
        language: system
        pass_filenames: false
        stages: [pre-push]

      - id: socket-scan
        name: Socket.dev Dependency Scan
        entry: bash -c 'if [ -z "$SOCKET_API_KEY" ]; then echo "Socket API key not set, skipping scan."; else npx -y socket ci; fi'
        language: system
        pass_filenames: false
        stages: [pre-push]

      - id: checkov
        name: Checkov IaC Security Scan
        entry: uvx checkov -d terraform/ --framework terraform --quiet
        language: system
        pass_filenames: false
        stages: [pre-push]

      - id: trivy
        name: Trivy Config Security Scan
        entry: trivy fs . --scanners config --severity HIGH,CRITICAL --exit-code 1 --quiet --skip-dirs .venv --skip-dirs backend/.venv --skip-dirs frontend/node_modules
        language: system
        pass_filenames: false
        stages: [pre-push]

      - id: django-migration-linter
        name: Django Migration Linter
        # Use backend venv (Django deps). Ignore historical squash/rename migrations
        # and 0041 (SQLite table-rebuild false positives for unique columns; production is Postgres).
        entry: >-
          bash -c 'cd backend && DATABASE_URL=sqlite:// .venv/bin/python manage.py lintmigrations
          --ignore-name
          0018_endpoints_traffic_enrichment
          0002_alter_endpoints_ip_address_statuspage_and_more
          0005_statuspage_is_published
          0004_remove_threatreport_user_and_more
          0023_tenant_stripe_customer_id_and_more
          0029_threatintelligence_threat_inte_ip_addr_03311d_idx_and_more
          0031_userprofile_linked_emails
          0009_rename_model_to_ml
          0033_user_centric_squash
          0034_drop_tenant_tables
          0006_user_centric_squash
          0041_rust_data_plane'
        language: system
        files: ^backend/.*/migrations/
        pass_filenames: false
        stages: [pre-push]

  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v4.0.0-alpha.8
    hooks:
      - id: prettier
        files: \.(js|ts|css|html|json|md|mjs)$
        exclude: ^(frontend/(public/llms-full\.txt|public/llms\.txt)|marketing/(public/llms-full\.txt|public/llms\.txt|src/assets/content/page\.md)|(.*/)?(design-tokens|deml-components|viking-components|viking-ui)\.css|(?:frontend/(?:src|public)/assets|marketing/public/assets|backend/static|viking-ui-docs/public/assets)/viking-ui-elements\.js|(?:frontend/(?:src|public)/assets|marketing/public/assets|backend/static|viking-ui-docs/public/assets)/widgets/.*\.js|marketing/public/assets/content/search-index\.json)$
        additional_dependencies:
          - prettier@3.8.2

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.18.2
    hooks:
      - id: gitleaks
        exclude: ^\.secrets\.baseline$

  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args: ['--baseline', '.secrets.baseline']
        exclude: 'package-lock\.json|frontend/src/app/bones/.*\.bones\.json|backend/templates/home\.html|skills-lock\.json|\.agents/skills/.*|docs/.*|marketing/public/.*|frontend/public/.*'
