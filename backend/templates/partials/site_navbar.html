{% load static %}
<script>
  window.__DEML = {
    FRONTEND_URL: "{{ frontend_url|escapejs }}",
    BACKEND_URL: "{{ request.scheme }}://{{ request.get_host }}",
    MARKETING_URL: "{{ marketing_url|escapejs }}",
  };
</script>
<header class="navbar">
  <div class="navbar-content">
    <div class="navbar-left">
      <a href="{{ marketing_url }}/" class="navbar-brand" aria-label="Go to homepage">
        <svg
          class="brand-icon navbar-logo glowing-icon-sm"
          xmlns="http://www.w3.org/2000/svg"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="1.8"
          stroke-linecap="round"
          stroke-linejoin="round"
          width="28"
          height="28"
          aria-hidden="true"
        >
          <path d="M4 4v16h16M8 16v-5M12 16V8M16 16v-3" />
        </svg>
      </a>
    </div>

    <nav class="navbar-center desktop-nav" aria-label="Main navigation">
      <a href="{{ frontend_url }}/explore" class="nav-btn">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" width="16" height="16" aria-hidden="true"><circle cx="12" cy="12" r="9"/><path d="M3 12h18"/><ellipse cx="12" cy="12" rx="4" ry="9"/></svg>
        <span>Explore</span>
      </a>
      <a href="{{ marketing_url }}/documentation/" class="nav-btn" target="_blank" rel="noopener noreferrer">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" width="16" height="16" aria-hidden="true"><path d="M14 3H6a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9l-6-6z"/><path d="M14 3v6h6"/></svg>
        <span>Documentation</span>
      </a>
    </nav>

    <div class="navbar-right">
      <div class="desktop-auth">
        <a href="{{ frontend_url }}/login" class="auth-btn" id="auth-btn-desktop">
          <span id="auth-icon-desktop"></span>
          <span id="auth-text-desktop">Sign In</span>
        </a>
      </div>
      <button type="button" class="theme-toggle-btn" aria-label="Toggle light and dark theme" id="theme-toggle-btn">
        <span id="theme-icon"></span>
      </button>
      <button type="button" class="menu-toggle-btn" aria-label="Toggle navigation menu" aria-expanded="false" id="mobile-menu-btn">
        <span id="menu-icon"></span>
      </button>
    </div>
  </div>

  <nav class="mobile-menu" id="mobile-menu" aria-label="Mobile navigation">
    <a href="{{ frontend_url }}/explore" class="mobile-nav-btn">
      <span>Explore</span>
    </a>
    <a href="{{ marketing_url }}/documentation/" class="mobile-nav-btn" target="_blank" rel="noopener noreferrer">
      <span>Documentation</span>
    </a>
    <div class="mobile-divider"></div>
    <a href="{{ frontend_url }}/login" class="mobile-auth-btn" id="auth-btn-mobile">
      <span id="auth-text-mobile">Sign In</span>
    </a>
  </nav>
</header>
<script src="{% static 'widgets/navbar.js' %}" defer></script>
