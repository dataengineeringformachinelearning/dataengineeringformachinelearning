{% load static %}
{# AUTO-GENERATED by frontend/scripts/build_site_drakkar.mjs — do not edit by hand #}
<script>
  window.__DEML = {
    ...(window.__DEML || {}),
    FRONTEND_URL: "{{ frontend_url|escapejs }}",
    BACKEND_URL: "{{ request.scheme }}://{{ request.get_host }}",
    MARKETING_URL: "{{ marketing_url|escapejs }}",
    USE_ALGOLIA_SEARCH: true,
  };
</script>
<header class="navbar">
  <div class="navbar-content">
    <div class="navbar-left">
      <a
        href="{{ marketing_url }}/"
        class="navbar-brand"
        aria-label="Go to homepage"
        id="navbar-brand-link"
      >
        <span
          class="brand-icon navbar-logo"
          data-viking-icon="drakkar"
          data-viking-icon-color="accent"
          data-viking-icon-size="28"
          aria-hidden="true"
        ></span>
      </a>
    </div>

    <nav class="navbar-center desktop-nav" aria-label="Main navigation">
      <a href="{{ frontend_url }}/explore" class="nav-btn" data-nav-id="explore">
        <span data-viking-icon="globe" data-viking-icon-size="16" aria-hidden="true"></span>
        <span>Explore</span>
      </a>
      <a href="https://dataengineeringformachinelearning.com/documentation/" class="nav-btn" data-nav-id="documentation">
        <span data-viking-icon="file" data-viking-icon-size="16" aria-hidden="true"></span>
        <span>Documentation</span>
      </a>
      <a href="https://dataengineeringformachinelearning.com/blog/" class="nav-btn" data-nav-id="blue-notes">
        <span data-viking-icon="file" data-viking-icon-size="16" aria-hidden="true"></span>
        <span>Blue Notes</span>
      </a>
      <a href="{{ frontend_url }}/dashboard" class="nav-btn" data-nav-id="dashboard" data-require-auth="true" hidden>
        <span data-viking-icon="home" data-viking-icon-size="16" aria-hidden="true"></span>
        <span>Dashboard</span>
      </a>
      <a href="{{ frontend_url }}/settings" class="nav-btn" data-nav-id="sites" data-require-auth="true" hidden>
        <span data-viking-icon="building" data-viking-icon-size="16" aria-hidden="true"></span>
        <span>Sites</span>
      </a>
      <a href="{{ frontend_url }}/account" class="nav-btn" data-nav-id="account" data-require-auth="true" hidden>
        <span data-viking-icon="user" data-viking-icon-size="16" aria-hidden="true"></span>
        <span>Account</span>
      </a>
    </nav>

    <div class="navbar-right">
      <div class="navbar-search" role="search">
        <viking-button-wc
          variant="outline"
          square
          compact
          class="navbar-search-trigger"
          role="button"
          aria-label="Open search (⌘K)"
          id="navbar-search-trigger"
        >
          <span data-viking-icon="search" data-viking-icon-size="20" aria-hidden="true"></span>
        </viking-button-wc>
      </div>

      <div class="desktop-auth">
        <viking-button-wc variant="primary" class="auth-btn" href="{{ frontend_url }}/login" id="auth-btn-desktop">
          <span id="auth-icon-desktop" data-viking-icon="arrow-right" data-viking-icon-size="16" aria-hidden="true"></span>
          <span id="auth-text-desktop">Sign In</span>
        </viking-button-wc>
        <viking-button-wc
          variant="ghost"
          class="auth-btn auth-signout-btn"
          id="auth-signout-desktop"
          hidden
        >
          Sign Out
        </viking-button-wc>
      </div>

      <viking-theme-toggle-wc class="theme-toggle-btn" role="button" aria-label="Toggle light and dark theme"></viking-theme-toggle-wc>

      <viking-button-wc variant="outline" square class="menu-toggle-btn" role="button" aria-label="Toggle navigation menu" aria-controls="mobile-menu" aria-expanded="false" id="mobile-menu-btn">
        <span data-viking-icon="menu" data-viking-icon-size="24" aria-hidden="true"></span>
      </viking-button-wc>
    </div>
  </div>

  <nav class="mobile-menu" id="mobile-menu" aria-label="Mobile navigation" hidden>
      <a href="{{ frontend_url }}/explore" class="mobile-nav-btn" data-nav-id="explore">
        <span data-viking-icon="globe" data-viking-icon-size="16" aria-hidden="true"></span>
        <span>Explore</span>
      </a>
      <a href="https://dataengineeringformachinelearning.com/documentation/" class="mobile-nav-btn" data-nav-id="documentation">
        <span data-viking-icon="file" data-viking-icon-size="16" aria-hidden="true"></span>
        <span>Documentation</span>
      </a>
      <a href="https://dataengineeringformachinelearning.com/blog/" class="mobile-nav-btn" data-nav-id="blue-notes">
        <span data-viking-icon="file" data-viking-icon-size="16" aria-hidden="true"></span>
        <span>Blue Notes</span>
      </a>
      <a href="{{ frontend_url }}/dashboard" class="mobile-nav-btn" data-nav-id="dashboard" data-require-auth="true" hidden>
        <span data-viking-icon="home" data-viking-icon-size="16" aria-hidden="true"></span>
        <span>Dashboard</span>
      </a>
      <a href="{{ frontend_url }}/settings" class="mobile-nav-btn" data-nav-id="sites" data-require-auth="true" hidden>

        <span>Sites</span>
      </a>
      <a href="{{ frontend_url }}/account" class="mobile-nav-btn" data-nav-id="account" data-require-auth="true" hidden>
        <span data-viking-icon="user" data-viking-icon-size="16" aria-hidden="true"></span>
        <span>Account</span>
      </a>

    <div class="mobile-divider"></div>

    <viking-button-wc
      variant="primary"
      full-width
      class="mobile-auth-btn auth-btn"
      href="{{ frontend_url }}/login"
      id="auth-btn-mobile"
    >
      <span id="auth-icon-mobile" data-viking-icon="arrow-right" data-viking-icon-size="16" aria-hidden="true"></span>
      <span id="auth-text-mobile">Sign In</span>
    </viking-button-wc>
    <viking-button-wc
      variant="ghost"
      full-width
      class="mobile-auth-btn auth-btn auth-signout-btn"
      id="auth-signout-mobile"
      hidden
    >Sign Out</viking-button-wc>
  </nav>
</header>
<div id="autocomplete" class="algolia-autocomplete-host" aria-hidden="true"></div>
<script src="{% static 'widgets/navbar.js' %}" defer></script>
<script type="module" src="{% static 'viking-ui-elements.js' %}"></script>
