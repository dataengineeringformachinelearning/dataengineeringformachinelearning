services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: machinelearning
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d machinelearning"]
      interval: 5s
      timeout: 5s
      retries: 5

  dragonfly:
    image: docker.dragonflydb.io/dragonflydb/dragonfly:latest
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:v23.2.14
    command:
      - redpanda
      - start
      - --smp 1
      - --overprovisioned
      # Dual listener for testing the authenticated public path locally:
      # internal = backend/workers (plaintext)
      # external (19092) = SASL for functions/emulator testing the fast direct path
      - --kafka-addr internal://0.0.0.0:9092,external://0.0.0.0:19092
      - --advertise-kafka-addr internal://redpanda:9092,external://localhost:19092
      - --pandaproxy-addr internal://0.0.0.0:8082,external://0.0.0.0:18082
      - --advertise-pandaproxy-addr internal://redpanda:8082,external://localhost:18082
      - --enable-sasl
      - --sasl-mechanisms SCRAM-SHA-256
    ports:
      - 19092:19092
      - 18082:18082
      - 19644:9644
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health"]
      interval: 10s
      timeout: 5s
      retries: 5

    # After first `docker compose up -d redpanda`, create the SASL user for the external listener (once):
    #   docker compose exec redpanda rpk security user create deml-func --password 'dev-only-change-me' --mechanism SCRAM-SHA-256
    # Then for local functions emulator testing of the direct path you can export:
    #   REDPANDA_BROKERS=localhost:19092 REDPANDA_SSL=false REDPANDA_SASL_USERNAME=deml-func REDPANDA_SASL_PASSWORD=dev-only-change-me
    # The fast (no-polling) path will be exercised when the Cloud Function code publishes.

  backend:
    build:
      context: ./backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings
      - DATABASE_URL=${DATABASE_URL:-postgres://admin:password@postgres:5432/machinelearning}
      - REDPANDA_BROKERS=${REDPANDA_BROKERS:-redpanda:9092}
      - CLICKHOUSE_HOST=${CLICKHOUSE_HOST:-clickhouse}
      - CLICKHOUSE_PORT=${CLICKHOUSE_PORT:-8123}
      - CLICKHOUSE_USER=${CLICKHOUSE_USER:-default}
      - CLICKHOUSE_PASSWORD=${CLICKHOUSE_PASSWORD:-password}
      - DRAGONFLY_HOST=dragonfly
      - FRONTEND_URL=http://localhost:4200
      - BACKEND_URL=http://localhost:8000
      - MARKETING_URL=http://localhost:4321
      - TOR_PROXY_URL=socks5h://tor-proxy:9050
      - STRUCTURED_LOGS=true
      - RUSTFS_ENDPOINT=${RUSTFS_ENDPOINT:-http://rustfs:9000}
      - RUSTFS_ACCESS_KEY=${RUSTFS_ACCESS_KEY:-deml-rustfs-dev}
      - RUSTFS_SECRET_KEY=${RUSTFS_SECRET_KEY:-deml-rustfs-dev-secret-change-me}
      - RUSTFS_BUCKET=${RUSTFS_BUCKET:-deml-exports}
      - RUSTFS_REGION=${RUSTFS_REGION:-us-east-1}
      - RUSTFS_USE_SSL=${RUSTFS_USE_SSL:-false}
    depends_on:
      postgres:
        condition: service_healthy
      redpanda:
        condition: service_healthy
    command: >
      sh -c "python manage.py migrate && python manage.py train_all_models && python manage.py runserver 0.0.0.0:8000"

  telemetry_worker:
    build:
      context: ./backend
    volumes:
      - ./backend:/app
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings
      - DATABASE_URL=${DATABASE_URL:-postgres://admin:password@postgres:5432/machinelearning}
      - REDPANDA_BROKERS=${REDPANDA_BROKERS:-redpanda:9092}
      - CLICKHOUSE_HOST=${CLICKHOUSE_HOST:-clickhouse}
      - CLICKHOUSE_PORT=${CLICKHOUSE_PORT:-8123}
      - CLICKHOUSE_USER=${CLICKHOUSE_USER:-default}
      - CLICKHOUSE_PASSWORD=${CLICKHOUSE_PASSWORD:-password}
      - DRAGONFLY_HOST=dragonfly
      - TOR_PROXY_URL=socks5h://tor-proxy:9050
      - STRUCTURED_LOGS=true
      - PYTHON_EMBEDDED_SCHEDULERS_ENABLED=0
    depends_on:
      backend:
        condition: service_started
    command: >
      sh -c "python manage.py telemetry_worker"

  # ── deml-workers: ML, lifecycle, and durable task execution ──────────────────
  # Runs deml_workers_start.py which asyncio.gather()'s:
  #   - ml_worker management command (thread)
  #   - lifecycle_worker management command (thread)
  #   - internal-tasks Redpanda consumer (async, cron triggers from deml-daemon)
  deml-workers:
    build:
      context: ./backend
    volumes:
      - ./backend:/app
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings
      - DATABASE_URL=${DATABASE_URL:-postgres://admin:password@postgres:5432/machinelearning}
      - REDPANDA_BROKERS=${REDPANDA_BROKERS:-redpanda:9092}
      - CLICKHOUSE_HOST=${CLICKHOUSE_HOST:-clickhouse}
      - CLICKHOUSE_PORT=${CLICKHOUSE_PORT:-8123}
      - CLICKHOUSE_USER=${CLICKHOUSE_USER:-default}
      - CLICKHOUSE_PASSWORD=${CLICKHOUSE_PASSWORD:-password}
      - DRAGONFLY_HOST=dragonfly
      - TOR_PROXY_URL=socks5h://tor-proxy:9050
      - SCANNER_SERVICE_URL=http://scanner:8000
      - CPE_GUESSER_URL=http://cpe-guesser:8080/unique
      - FIRECRAWL_ENABLED=${FIRECRAWL_ENABLED:-false}
      - FIRECRAWL_API_URL=${FIRECRAWL_API_URL:-https://api.firecrawl.dev}
      - FIRECRAWL_API_KEY=${FIRECRAWL_API_KEY:-}
      - STRUCTURED_LOGS=true
      - PYTHON_EMBEDDED_SCHEDULERS_ENABLED=0
      - RUSTFS_ENDPOINT=${RUSTFS_ENDPOINT:-http://rustfs:9000}
      - RUSTFS_ACCESS_KEY=${RUSTFS_ACCESS_KEY:-deml-rustfs-dev}
      - RUSTFS_SECRET_KEY=${RUSTFS_SECRET_KEY:-deml-rustfs-dev-secret-change-me}
      - RUSTFS_BUCKET=${RUSTFS_BUCKET:-deml-exports}
      - RUSTFS_REGION=${RUSTFS_REGION:-us-east-1}
      - RUSTFS_USE_SSL=${RUSTFS_USE_SSL:-false}
    depends_on:
      backend:
        condition: service_started
    command: >
      sh -c "python deml_workers_start.py"
    restart: unless-stopped

  # ── Rust data plane: one image, independently scalable roles ──────────────
  deml-relay:
    build:
      context: .
      dockerfile: rust/deml-daemon/Dockerfile
    environment:
      - DEML_ROLE=relay
      - DATABASE_URL=${DATABASE_URL:-postgres://admin:password@postgres:5432/machinelearning}
      - REDPANDA_BROKERS=${REDPANDA_BROKERS:-redpanda:9092}
      - REDPANDA_SASL_USERNAME=${REDPANDA_SASL_USERNAME:-}
      - REDPANDA_SASL_PASSWORD=${REDPANDA_SASL_PASSWORD:-}
      - REDPANDA_SSL=${REDPANDA_SSL:-false}
      - BATCH_SIZE=100
      - POLL_INTERVAL_SECS=1
      - MAX_ATTEMPTS=5
      - MAX_CONCURRENCY=64
      - STRUCTURED_LOGS=true
    depends_on:
      postgres:
        condition: service_healthy
      redpanda:
        condition: service_healthy
    restart: unless-stopped

  deml-scheduler:
    build:
      context: .
      dockerfile: rust/deml-daemon/Dockerfile
    environment:
      - DEML_ROLE=scheduler
      - DATABASE_URL=${DATABASE_URL:-postgres://admin:password@postgres:5432/machinelearning}
      - REDPANDA_BROKERS=${REDPANDA_BROKERS:-redpanda:9092}
      - REDPANDA_SASL_USERNAME=${REDPANDA_SASL_USERNAME:-}
      - REDPANDA_SASL_PASSWORD=${REDPANDA_SASL_PASSWORD:-}
      - REDPANDA_SSL=${REDPANDA_SSL:-false}
      - STRUCTURED_LOGS=true
    depends_on:
      postgres:
        condition: service_healthy
      redpanda:
        condition: service_healthy
    restart: unless-stopped

  deml-probe:
    build:
      context: .
      dockerfile: rust/deml-daemon/Dockerfile
    environment:
      - DEML_ROLE=probe
      - DATABASE_URL=${DATABASE_URL:-postgres://admin:password@postgres:5432/machinelearning}
      - PINGER_INTERVAL_SECS=30
      - MAX_CONCURRENCY=64
      - STRUCTURED_LOGS=true
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  deml-normalizer:
    build:
      context: .
      dockerfile: rust/deml-daemon/Dockerfile
    environment:
      - DEML_ROLE=normalizer
      - DATABASE_URL=${DATABASE_URL:-postgres://admin:password@postgres:5432/machinelearning}
      - REDPANDA_BROKERS=${REDPANDA_BROKERS:-redpanda:9092}
      - REDPANDA_SASL_USERNAME=${REDPANDA_SASL_USERNAME:-}
      - REDPANDA_SASL_PASSWORD=${REDPANDA_SASL_PASSWORD:-}
      - REDPANDA_SSL=${REDPANDA_SSL:-false}
      - STRUCTURED_LOGS=true
    depends_on:
      postgres:
        condition: service_healthy
      redpanda:
        condition: service_healthy
    restart: unless-stopped

  deml-ingest:
    build:
      context: .
      dockerfile: rust/deml-daemon/Dockerfile
    ports:
      - "8081:8080"
    environment:
      - DEML_ROLE=ingest
      - PORT=8080
      - DATABASE_URL=${DATABASE_URL:-postgres://admin:password@postgres:5432/machinelearning}
      - REDIS_URL=redis://dragonfly:6379
      - STRUCTURED_LOGS=true
    depends_on:
      postgres:
        condition: service_healthy
      dragonfly:
        condition: service_started
    restart: unless-stopped

  clickhouse:
    build:
      context: ./infrastructure/clickhouse
    container_name: clickhouse
    environment:
      - CLICKHOUSE_USER=${CLICKHOUSE_USER:-default}
      - CLICKHOUSE_PASSWORD=${CLICKHOUSE_PASSWORD:-password}
      - CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT=1
    ports:
      - "8123:8123"
      - "9000:9000"
    volumes:
      - clickhouse-data:/var/lib/clickhouse
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "localhost:8123/ping"]
      interval: 5s
      timeout: 5s
      retries: 3
    # read_only: true # Removed to allow ClickHouse to write preprocessed configs
    tmpfs:
      - /var/log/clickhouse-server
      - /tmp
    restart: unless-stopped

  # Set OTEL_EXPORTER_OTLP_ENDPOINT on Rust roles when an OTLP collector or managed
  # endpoint is deployed. ClickHouse does not natively receive OTLP.

  cpe-indexer:
    build:
      context: .
      dockerfile: infrastructure/cpe-guesser/Dockerfile
    environment:
      - CPE_REDIS_HOST=dragonfly
      - CPE_REDIS_PORT=6379
      - CPE_REDIS_DB=8
    volumes:
      - cpe-data:/app/data
    depends_on:
      dragonfly:
        condition: service_started
    security_opt:
      - no-new-privileges:true
    restart: "no"

  cpe-guesser:
    build:
      context: .
      dockerfile: rust/deml-daemon/Dockerfile
    container_name: cpe-guesser
    ports:
      - "1323:8080"
    environment:
      - DEML_ROLE=cpe
      - PORT=8080
      - DATABASE_URL=${DATABASE_URL:-postgres://admin:password@postgres:5432/machinelearning}
      - CPE_REDIS_URL=redis://dragonfly:6379/8
      - STRUCTURED_LOGS=true
    depends_on:
      postgres:
        condition: service_healthy
      cpe-indexer:
        condition: service_completed_successfully
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped

  # dependency-track-apiserver removed — the API was never called from application
  # code (no Python file referenced it). CVE/SBOM scanning is handled by the
  # deml-daemon cpe_intel task (Phase 3) via direct NVD + OSV.dev API calls.

  tor-proxy:
    build:
      context: ./infrastructure/tor-proxy
      dockerfile: Dockerfile
    container_name: tor-proxy
    ports:
      - "9050:9050"
    read_only: true
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped

  scanner:
    build:
      context: ./infrastructure/scanner
    container_name: scanner
    ports:
      - "8001:8000"
    environment:
      - CPE_GUESSER_URL=http://cpe-guesser:8080/unique
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
    restart: unless-stopped

  # S3-compatible object store for analytics export artifacts (PDF/CSV/Parquet).
  # Host ports 9100/9101 avoid clash with ClickHouse container port 9000.
  # Runtime user is 10001:10001 — permission helper chowns named volumes once.
  rustfs-perms:
    image: alpine:3.21
    user: root
    volumes:
      - rustfs-data:/data
      - rustfs-logs:/logs
    command: >
      sh -c "chown -R 10001:10001 /data /logs && echo rustfs volume permissions ok"
    restart: "no"

  rustfs:
    build:
      context: .
      dockerfile: infrastructure/rustfs/Dockerfile
    container_name: rustfs
    depends_on:
      rustfs-perms:
        condition: service_completed_successfully
    ports:
      - "9100:9000"
      - "9101:9001"
    environment:
      - RUSTFS_ACCESS_KEY=${RUSTFS_ACCESS_KEY:-deml-rustfs-dev}
      - RUSTFS_SECRET_KEY=${RUSTFS_SECRET_KEY:-deml-rustfs-dev-secret-change-me}
      - RUSTFS_CONSOLE_ENABLE=${RUSTFS_CONSOLE_ENABLE:-true}
      - RUSTFS_ADDRESS=0.0.0.0:9000
      - RUSTFS_CONSOLE_ADDRESS=0.0.0.0:9001
      - RUSTFS_OBS_LOGGER_LEVEL=info
      # SNSD local: single volume path (see infrastructure/rustfs/README.md)
      - RUSTFS_VOLUMES=/data
    volumes:
      - rustfs-data:/data
      - rustfs-logs:/logs
    command: ["/data"]
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:9000/health"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 40s
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped

volumes:
  clickhouse-data:
  cpe-data:
  rustfs-data:
  rustfs-logs:
