version: "3.9"

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: machinelearning
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d machinelearning"]
      interval: 5s
      timeout: 5s
      retries: 5

  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:v23.2.14
    command:
      - redpanda
      - start
      - --smp 1
      - --overprovisioned
      - --kafka-addr internal://0.0.0.0:9092,external://0.0.0.0:19092
      - --advertise-kafka-addr internal://redpanda:9092,external://localhost:19092
      - --pandaproxy-addr internal://0.0.0.0:8082,external://0.0.0.0:18082
      - --advertise-pandaproxy-addr internal://redpanda:8082,external://localhost:18082
    ports:
      - 19092:19092
      - 18082:18082
      - 19644:9644
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings
      - DATABASE_URL=${DATABASE_URL:-postgres://admin:password@postgres:5432/machinelearning}
      - REDPANDA_BROKERS=${REDPANDA_BROKERS:-redpanda:9092}
      - CLICKHOUSE_HOST=${CLICKHOUSE_HOST:-clickhouse}
      - CLICKHOUSE_PORT=${CLICKHOUSE_PORT:-8123}
      - CLICKHOUSE_USER=${CLICKHOUSE_USER:-default}
      - CLICKHOUSE_PASSWORD=${CLICKHOUSE_PASSWORD:-password}
    depends_on:
      postgres:
        condition: service_healthy
      redpanda:
        condition: service_healthy
    command: >
      sh -c "python manage.py migrate && python manage.py train_all_models && python manage.py runserver 0.0.0.0:8000"

  telemetry_worker:
    build:
      context: ./backend
    volumes:
      - ./backend:/app
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings
      - DATABASE_URL=${DATABASE_URL:-postgres://admin:password@postgres:5432/machinelearning}
      - REDPANDA_BROKERS=${REDPANDA_BROKERS:-redpanda:9092}
      - CLICKHOUSE_HOST=${CLICKHOUSE_HOST:-clickhouse}
      - CLICKHOUSE_PORT=${CLICKHOUSE_PORT:-8123}
      - CLICKHOUSE_USER=${CLICKHOUSE_USER:-default}
      - CLICKHOUSE_PASSWORD=${CLICKHOUSE_PASSWORD:-password}
    depends_on:
      backend:
        condition: service_started
    command: >
      sh -c "python manage.py telemetry_worker"

  ml_worker:
    build:
      context: ./backend
    volumes:
      - ./backend:/app
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings
      - DATABASE_URL=${DATABASE_URL:-postgres://admin:password@postgres:5432/machinelearning}
      - REDPANDA_BROKERS=${REDPANDA_BROKERS:-redpanda:9092}
      - CLICKHOUSE_HOST=${CLICKHOUSE_HOST:-clickhouse}
      - CLICKHOUSE_PORT=${CLICKHOUSE_PORT:-8123}
      - CLICKHOUSE_USER=${CLICKHOUSE_USER:-default}
      - CLICKHOUSE_PASSWORD=${CLICKHOUSE_PASSWORD:-password}
    depends_on:
      backend:
        condition: service_started
    command: >
      sh -c "python manage.py ml_worker"

  clickhouse:
    build:
      context: ./infrastructure/clickhouse
    container_name: clickhouse
    environment:
      - CLICKHOUSE_USER=${CLICKHOUSE_USER:-default}
      - CLICKHOUSE_PASSWORD=${CLICKHOUSE_PASSWORD:-password}
      - CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT=1
    ports:
      - "8123:8123"
      - "9000:9000"
    volumes:
      - clickhouse-data:/var/lib/clickhouse
    healthcheck:
      test: ['CMD', 'wget', '--spider', '-q', 'localhost:8123/ping']
      interval: 5s
      timeout: 5s
      retries: 3
    # read_only: true # Removed to allow ClickHouse to write preprocessed configs
    tmpfs:
      - /var/log/clickhouse-server
      - /tmp
    restart: unless-stopped

  otel-collector:
    build:
      context: ./infrastructure/otel-collector
    container_name: otel-collector
    environment:
      - CLICKHOUSE_HOST=${CLICKHOUSE_HOST:-clickhouse}
      - CLICKHOUSE_PORT=${CLICKHOUSE_PORT:-8123}
      - CLICKHOUSE_USER=${CLICKHOUSE_USER:-default}
      - CLICKHOUSE_PASSWORD=${CLICKHOUSE_PASSWORD:-password}
    ports:
      - "4317:4317" # OTLP gRPC
      - "4318:4318" # OTLP HTTP
    depends_on:
      clickhouse:
        condition: service_healthy
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
    restart: unless-stopped

  cpe-guesser:
    build:
      context: ./infrastructure/cpe-guesser
    container_name: cpe-guesser
    ports:
      - "1323:1323"
    security_opt:
      - no-new-privileges:true
    read_only: true
    restart: unless-stopped

  dependency-track-apiserver:
    build:
      context: ./infrastructure/dependency-track
      dockerfile: Dockerfile
    container_name: dependency-track-apiserver
    environment:
      - ALPINE_DATABASE_MODE=external
      - ALPINE_DATABASE_URL=jdbc:postgresql://postgres:5432/machinelearning
      - ALPINE_DATABASE_DRIVER=org.postgresql.Driver
      - ALPINE_DATABASE_USERNAME=admin
      - ALPINE_DATABASE_PASSWORD=password
    ports:
      - "8081:8080"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  tor-proxy:
    build:
      context: ./infrastructure/tor-proxy
      dockerfile: Dockerfile
    container_name: tor-proxy
    ports:
      - "9050:9050"
    read_only: true
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped

volumes:
  clickhouse-data:
