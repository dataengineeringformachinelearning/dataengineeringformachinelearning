# Local user control plane only. FORJD owns sealed ingest, projections, and ML.
# See docs/FORJD_INTEGRATION.md. Sessions use Postgres.
services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: machinelearning
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d machinelearning"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings
      - DATABASE_URL=${DATABASE_URL:-postgres://admin:password@postgres:5432/machinelearning}
      - FRONTEND_URL=http://localhost:4200
      - BACKEND_URL=http://localhost:8000
      - MARKETING_URL=http://localhost:4321
      - STRUCTURED_LOGS=true
      - FORJD_API_URL=${FORJD_API_URL:-https://backend.forjd.co}
      - FORJD_SERVICE_TOKEN=${FORJD_SERVICE_TOKEN:-}
      - FORJD_TENANT_ID=${FORJD_TENANT_ID:-}
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      sh -c "python manage.py migrate && python manage.py runserver 0.0.0.0:8000"
