services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: machinelearning
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d machinelearning"]
      interval: 5s
      timeout: 5s
      retries: 5

  dragonfly:
    image: docker.dragonflydb.io/dragonflydb/dragonfly:latest
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:v23.2.14
    command:
      - redpanda
      - start
      - --smp 1
      - --overprovisioned
      # Dual listener for testing the authenticated public path locally:
      # internal = backend/workers (plaintext)
      # external (19092) = SASL for functions/emulator testing the fast direct path
      - --kafka-addr internal://0.0.0.0:9092,external://0.0.0.0:19092
      - --advertise-kafka-addr internal://redpanda:9092,external://localhost:19092
      - --pandaproxy-addr internal://0.0.0.0:8082,external://0.0.0.0:18082
      - --advertise-pandaproxy-addr internal://redpanda:8082,external://localhost:18082
      - --enable-sasl
      - --sasl-mechanisms SCRAM-SHA-256
    ports:
      - 19092:19092
      - 18082:18082
      - 19644:9644
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health"]
      interval: 10s
      timeout: 5s
      retries: 5

    # After first `docker compose up -d redpanda`, create the SASL user for the external listener (once):
    #   docker compose exec redpanda rpk security user create deml-func --password 'dev-only-change-me' --mechanism SCRAM-SHA-256
    # Then for local functions emulator testing of the direct path you can export:
    #   REDPANDA_BROKERS=localhost:19092 REDPANDA_SSL=false REDPANDA_SASL_USERNAME=deml-func REDPANDA_SASL_PASSWORD=dev-only-change-me
    # The fast (no-polling) path will be exercised when the Cloud Function code publishes.

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings
      - DATABASE_URL=${DATABASE_URL:-postgres://admin:password@postgres:5432/machinelearning}
      - REDPANDA_BROKERS=${REDPANDA_BROKERS:-redpanda:9092}
      - CLICKHOUSE_HOST=${CLICKHOUSE_HOST:-clickhouse}
      - CLICKHOUSE_PORT=${CLICKHOUSE_PORT:-8123}
      - CLICKHOUSE_USER=${CLICKHOUSE_USER:-default}
      - CLICKHOUSE_PASSWORD=${CLICKHOUSE_PASSWORD:-password}
      - DRAGONFLY_HOST=dragonfly
      - FRONTEND_URL=http://localhost:4200
      - BACKEND_URL=http://localhost:8000
      - MARKETING_URL=http://localhost:4321
      - TOR_PROXY_URL=socks5h://tor-proxy:9050
      - INTERNAL_SECRET=${INTERNAL_SECRET:-dev-internal-secret}
      - STRUCTURED_LOGS=true
    depends_on:
      postgres:
        condition: service_healthy
      redpanda:
        condition: service_healthy
    command: >
      sh -c "python manage.py migrate && python manage.py train_all_models && python manage.py runserver 0.0.0.0:8000"

  telemetry_worker:
    build:
      context: .
      dockerfile: backend/Dockerfile
    volumes:
      - ./backend:/app
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings
      - DATABASE_URL=${DATABASE_URL:-postgres://admin:password@postgres:5432/machinelearning}
      - REDPANDA_BROKERS=${REDPANDA_BROKERS:-redpanda:9092}
      - CLICKHOUSE_HOST=${CLICKHOUSE_HOST:-clickhouse}
      - CLICKHOUSE_PORT=${CLICKHOUSE_PORT:-8123}
      - CLICKHOUSE_USER=${CLICKHOUSE_USER:-default}
      - CLICKHOUSE_PASSWORD=${CLICKHOUSE_PASSWORD:-password}
      - DRAGONFLY_HOST=dragonfly
      - TOR_PROXY_URL=socks5h://tor-proxy:9050
      - STRUCTURED_LOGS=true
    depends_on:
      backend:
        condition: service_started
    command: >
      sh -c "python manage.py telemetry_worker"

  # ── deml-workers: merged ML + Security + cron-task consumer ─────────────────
  # Replaces: ml_worker, security_worker (Phase 3 consolidation).
  # Runs deml_workers_start.py which asyncio.gather()'s:
  #   - security_worker management command (thread)
  #   - ml_worker management command (thread)
  #   - internal-tasks Redpanda consumer (async, cron triggers from deml-daemon)
  deml-workers:
    build:
      context: .
      dockerfile: backend/Dockerfile
    volumes:
      - ./backend:/app
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings
      - DATABASE_URL=${DATABASE_URL:-postgres://admin:password@postgres:5432/machinelearning}
      - REDPANDA_BROKERS=${REDPANDA_BROKERS:-redpanda:9092}
      - CLICKHOUSE_HOST=${CLICKHOUSE_HOST:-clickhouse}
      - CLICKHOUSE_PORT=${CLICKHOUSE_PORT:-8123}
      - CLICKHOUSE_USER=${CLICKHOUSE_USER:-default}
      - CLICKHOUSE_PASSWORD=${CLICKHOUSE_PASSWORD:-password}
      - DRAGONFLY_HOST=dragonfly
      - TOR_PROXY_URL=socks5h://tor-proxy:9050
      - SCANNER_SERVICE_URL=http://scanner:8000
      - CPE_GUESSER_URL=http://cpe-guesser:1323/unique
      - STRUCTURED_LOGS=true
    depends_on:
      backend:
        condition: service_started
    command: >
      sh -c "python deml_workers_start.py"
    restart: unless-stopped

  # ── deml-daemon: Rust multi-task background daemon ────────────────────────
  # Phase 1: outbox relay (Postgres → Redpanda).
  # Phase 2+: telemetry consumer, health pinger, cron publisher.
  # Build context is ./rust (workspace root); Dockerfile is inside deml-daemon/.
  deml-daemon:
    build:
      context: ./rust
      dockerfile: deml-daemon/Dockerfile
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgres://admin:password@postgres:5432/machinelearning}
      - REDPANDA_BROKERS=${REDPANDA_BROKERS:-redpanda:9092}
      # Leave SASL vars unset for local dev (plain TCP). Set in Railway for production.
      - REDPANDA_SASL_USERNAME=${REDPANDA_SASL_USERNAME:-}
      - REDPANDA_SASL_PASSWORD=${REDPANDA_SASL_PASSWORD:-}
      - REDPANDA_SSL=${REDPANDA_SSL:-false}
      - BATCH_SIZE=100
      - POLL_INTERVAL_SECS=5
      - MAX_ATTEMPTS=5
      - STRUCTURED_LOGS=true
      - BACKEND_INTERNAL_URL=http://backend:8000
      - INTERNAL_SECRET=${INTERNAL_SECRET:-dev-internal-secret}
      - PINGER_INTERVAL_SECS=30
    depends_on:
      postgres:
        condition: service_healthy
      redpanda:
        condition: service_healthy
      backend:
        condition: service_started  # health_pinger POSTs to backend — wait for it to start
    restart: unless-stopped

  clickhouse:
    build:
      context: ./infrastructure/clickhouse
    container_name: clickhouse
    environment:
      - CLICKHOUSE_USER=${CLICKHOUSE_USER:-default}
      - CLICKHOUSE_PASSWORD=${CLICKHOUSE_PASSWORD:-password}
      - CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT=1
    ports:
      - "8123:8123"
      - "9000:9000"
    volumes:
      - clickhouse-data:/var/lib/clickhouse
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "localhost:8123/ping"]
      interval: 5s
      timeout: 5s
      retries: 3
    # read_only: true # Removed to allow ClickHouse to write preprocessed configs
    tmpfs:
      - /var/log/clickhouse-server
      - /tmp
    restart: unless-stopped

  # otel-collector removed — the Django backend was never instrumented with the
  # opentelemetry-sdk (no OTEL_EXPORTER_OTLP_ENDPOINT set, no otel imports in Python
  # code) and the Angular frontend was not sending to it either. The container was
  # running idle. When OpenTelemetry tracing is added to Django, deploy a fresh
  # otel-collector (or use the Grafana Alloy / Uptrace sidecar) and point
  # OTEL_EXPORTER_OTLP_ENDPOINT at it. ClickHouse does NOT natively receive OTLP.

  cpe-guesser:
    build:
      context: ./infrastructure/cpe-guesser
    container_name: cpe-guesser
    ports:
      - "1323:1323"
    security_opt:
      - no-new-privileges:true
    read_only: true
    restart: unless-stopped

  # dependency-track-apiserver removed — the API was never called from application
  # code (no Python file referenced it). CVE/SBOM scanning is handled by the
  # deml-daemon cpe_intel task (Phase 3) via direct NVD + OSV.dev API calls.

  tor-proxy:
    build:
      context: ./infrastructure/tor-proxy
      dockerfile: Dockerfile
    container_name: tor-proxy
    ports:
      - "9050:9050"
    read_only: true
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped

  scanner:
    build:
      context: ./infrastructure/scanner
    container_name: scanner
    ports:
      - "8001:8000"
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
    restart: unless-stopped

volumes:
  clickhouse-data:
