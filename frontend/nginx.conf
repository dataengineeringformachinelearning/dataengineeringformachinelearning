server {
    listen 8080;
    server_name localhost;
    port_in_redirect off;

    # Hide Nginx version for security
    server_tokens off;

    # Limit client request body size
    client_max_body_size 10M;

    root /usr/share/nginx/html;
    index index.html;

    # Enable gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml+rss
        application/atom+xml
        image/svg+xml;

    # Shared security headers helper
    # (Note: In Nginx, if a location block contains add_header directives, it does not inherit parent headers)
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; worker-src 'self' blob:; script-src 'self' 'unsafe-inline' https://apis.google.com https://*.firebaseapp.com https://www.google.com/recaptcha/ https://www.gstatic.com/recaptcha/ https://static.cloudflareinsights.com https://esm.sh; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' data: https://fonts.gstatic.com https://fonts.googleapis.com; connect-src 'self' https://*.googleapis.com https://*.firebaseio.com https://*.sentry.io https://backend.dataengineeringformachinelearning.com https://*.up.railway.app https://*.sanity.io https://*.apicdn.sanity.io https://www.google.com/recaptcha/ https://api.ipify.org https://fonts.gstatic.com https://fonts.googleapis.com https://telemetry.dataengineeringformachinelearning.com https://esm.sh; img-src 'self' data: blob: https://*.sanity.io https://railway.com https://app.fossa.com https://img.shields.io https://*.basemaps.cartocdn.com; media-src 'self' https://*.sanity.io; frame-src 'self' https://*.firebaseapp.com https://www.google.com/recaptcha/ https://recaptcha.google.com/recaptcha/;" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # Ensure we serve index.html for all routes (SPA fallback)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Add explicit index.html handling
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
        # Repeat security headers to avoid inheritance loss
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Content-Security-Policy "default-src 'self'; worker-src 'self' blob:; script-src 'self' 'unsafe-inline' https://apis.google.com https://*.firebaseapp.com https://www.google.com/recaptcha/ https://www.gstatic.com/recaptcha/ https://static.cloudflareinsights.com https://esm.sh; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' data: https://fonts.gstatic.com https://fonts.googleapis.com; connect-src 'self' https://*.googleapis.com https://*.firebaseio.com https://*.sentry.io https://backend.dataengineeringformachinelearning.com https://*.up.railway.app https://*.sanity.io https://*.apicdn.sanity.io https://www.google.com/recaptcha/ https://api.ipify.org https://fonts.gstatic.com https://fonts.googleapis.com https://telemetry.dataengineeringformachinelearning.com https://esm.sh; img-src 'self' data: blob: https://*.sanity.io https://railway.com https://app.fossa.com https://img.shields.io https://*.basemaps.cartocdn.com; media-src 'self' https://*.sanity.io; frame-src 'self' https://*.firebaseapp.com https://www.google.com/recaptcha/ https://recaptcha.google.com/recaptcha/;" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    }

    # Debug endpoint to verify nginx is working
    location /nginx-status {
        access_log off;
        return 200 "nginx is running\n";
        add_header Content-Type text/plain;
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header Access-Control-Allow-Origin "*" always;
        # Repeat security headers to avoid inheritance loss
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Content-Security-Policy "default-src 'self'; worker-src 'self' blob:; script-src 'self' 'unsafe-inline' https://apis.google.com https://*.firebaseapp.com https://www.google.com/recaptcha/ https://www.gstatic.com/recaptcha/ https://static.cloudflareinsights.com https://esm.sh; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' data: https://fonts.gstatic.com https://fonts.googleapis.com; connect-src 'self' https://*.googleapis.com https://*.firebaseio.com https://*.sentry.io https://backend.dataengineeringformachinelearning.com https://*.up.railway.app https://*.sanity.io https://*.apicdn.sanity.io https://www.google.com/recaptcha/ https://api.ipify.org https://fonts.gstatic.com https://fonts.googleapis.com https://telemetry.dataengineeringformachinelearning.com https://esm.sh; img-src 'self' data: blob: https://*.sanity.io https://railway.com https://app.fossa.com https://img.shields.io https://*.basemaps.cartocdn.com; media-src 'self' https://*.sanity.io; frame-src 'self' https://*.firebaseapp.com https://www.google.com/recaptcha/ https://recaptcha.google.com/recaptcha/;" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    }
}
