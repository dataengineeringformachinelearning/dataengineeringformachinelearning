server {
    listen 8080;
    server_name localhost;
    port_in_redirect off;

    # Hide Nginx version for security
    server_tokens off;

    # Limit client request body size
    client_max_body_size 10M;

    root /usr/share/nginx/html;
    index index.html;

    # Enable gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml+rss
        application/atom+xml
        image/svg+xml;

    # Crawler discovery — serve before SPA fallback with explicit content types.
    location = /robots.txt {
        add_header Content-Type text/plain;
        add_header Cache-Control "public, max-age=3600";
        try_files $uri =404;
    }

    location = /sitemap.xml {
        add_header Content-Type application/xml;
        add_header Cache-Control "public, max-age=3600";
        try_files $uri =404;
    }

    location = /sitemap-index.xml {
        add_header Content-Type application/xml;
        add_header Cache-Control "public, max-age=3600";
        try_files $uri =404;
    }

    # Cross-surface auth bridge. This one route is intentionally frameable only
    # by DEML-owned surfaces; all other app routes retain SAMEORIGIN.
    location = /auth-status {
        try_files /index.html =404;
        add_header Cache-Control "no-store" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://apis.google.com https://*.firebaseapp.com; style-src 'self' 'unsafe-inline'; font-src 'self' data:; connect-src 'self' https://*.googleapis.com https://*.firebaseio.com https://backend.deml.app https://*.backend.deml.app; frame-src 'self' https://*.firebaseapp.com; frame-ancestors 'self' https://dataengineeringformachinelearning.com https://*.dataengineeringformachinelearning.com https://backend.deml.app https://*.backend.deml.app https://ui.dataengineeringformachinelearning.com http://localhost:* http://127.0.0.1:*; base-uri 'self'; object-src 'none';" always;
    }

    # Ensure we serve index.html for all routes (SPA fallback)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Add explicit index.html handling and CSP
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
        add_header Content-Security-Policy "default-src 'self'; worker-src 'self' blob:; script-src 'self' 'unsafe-inline' https://apis.google.com https://*.firebaseapp.com https://www.google.com/recaptcha/ https://www.gstatic.com/recaptcha/ https://static.cloudflareinsights.com https://esm.sh https://cdn.jsdelivr.net https://*.jsdelivr.net https://*.algolia.net https://*.algolianet.com https://*.algolia.io https://experiences.cdn.algolia.com https://www.googletagmanager.com https://*.googletagmanager.com https://www.clarity.ms https://*.clarity.ms https://deml.app https://*.deml.app https://backend.deml.app https://*.backend.deml.app https://dataengineeringformachinelearning.com https://*.dataengineeringformachinelearning.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdn.jsdelivr.net https://*.jsdelivr.net https://*.deml.app https://*.dataengineeringformachinelearning.com; font-src 'self' data: https://fonts.gstatic.com https://fonts.googleapis.com; connect-src 'self' https://static.cloudflareinsights.com https://cloudflareinsights.com https://*.cloudflareinsights.com https://*.googleapis.com https://*.firebaseio.com https://*.sentry.io https://*.sanity.io https://*.apicdn.sanity.io https://www.google.com/recaptcha/ https://api.ipify.org https://fonts.gstatic.com https://fonts.googleapis.com https://esm.sh https://cdn.jsdelivr.net https://*.jsdelivr.net https://*.algolia.net https://*.algolianet.com https://*.algolia.io https://experiences.resolver.algolia.com https://experiences.cdn.algolia.com https://experiences.algolia.com https://deml.app https://*.deml.app https://backend.deml.app https://*.backend.deml.app https://dataengineeringformachinelearning.com https://*.dataengineeringformachinelearning.com https://analytics.google.com https://*.analytics.google.com https://*.google-analytics.com https://*.googletagmanager.com https://*.clarity.ms https://*.bing.com; img-src 'self' data: blob: https://*.sanity.io https://railway.com https://app.fossa.com https://img.shields.io https://*.basemaps.cartocdn.com https://*.deml.app https://*.dataengineeringformachinelearning.com; media-src 'self' https://*.sanity.io; frame-src 'self' https://*.firebaseapp.com https://www.google.com/recaptcha/ https://recaptcha.google.com/recaptcha/ https://*.deml.app https://*.dataengineeringformachinelearning.com; upgrade-insecure-requests; block-all-mixed-content;" always;
    }

    # Debug endpoint to verify nginx is working
    location /nginx-status {
        access_log off;
        return 200 "nginx is running\n";
        add_header Content-Type text/plain;
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header Access-Control-Allow-Origin "*" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
        add_header Content-Security-Policy "default-src 'self'; worker-src 'self' blob:; script-src 'self' 'unsafe-inline' https://apis.google.com https://*.firebaseapp.com https://www.google.com/recaptcha/ https://www.gstatic.com/recaptcha/ https://static.cloudflareinsights.com https://esm.sh https://cdn.jsdelivr.net https://*.jsdelivr.net https://*.algolia.net https://*.algolianet.com https://*.algolia.io https://experiences.cdn.algolia.com https://www.googletagmanager.com https://*.googletagmanager.com https://www.clarity.ms https://*.clarity.ms https://deml.app https://*.deml.app https://backend.deml.app https://*.backend.deml.app https://dataengineeringformachinelearning.com https://*.dataengineeringformachinelearning.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdn.jsdelivr.net https://*.jsdelivr.net https://*.deml.app https://*.dataengineeringformachinelearning.com; font-src 'self' data: https://fonts.gstatic.com https://fonts.googleapis.com; connect-src 'self' https://static.cloudflareinsights.com https://cloudflareinsights.com https://*.cloudflareinsights.com https://*.googleapis.com https://*.firebaseio.com https://*.sentry.io https://*.sanity.io https://*.apicdn.sanity.io https://www.google.com/recaptcha/ https://api.ipify.org https://fonts.gstatic.com https://fonts.googleapis.com https://esm.sh https://cdn.jsdelivr.net https://*.jsdelivr.net https://*.algolia.net https://*.algolianet.com https://*.algolia.io https://experiences.resolver.algolia.com https://experiences.cdn.algolia.com https://experiences.algolia.com https://deml.app https://*.deml.app https://backend.deml.app https://*.backend.deml.app https://dataengineeringformachinelearning.com https://*.dataengineeringformachinelearning.com https://analytics.google.com https://*.analytics.google.com https://*.google-analytics.com https://*.googletagmanager.com https://*.clarity.ms https://*.bing.com; img-src 'self' data: blob: https://*.sanity.io https://railway.com https://app.fossa.com https://img.shields.io https://*.basemaps.cartocdn.com https://*.deml.app https://*.dataengineeringformachinelearning.com; media-src 'self' https://*.sanity.io; frame-src 'self' https://*.firebaseapp.com https://www.google.com/recaptcha/ https://recaptcha.google.com/recaptcha/ https://*.deml.app https://*.dataengineeringformachinelearning.com; upgrade-insecure-requests; block-all-mixed-content;" always;
    }
}
