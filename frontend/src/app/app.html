@if (isAuthStatusPage()) {
<router-outlet />
} @else if (!authService.isInitialized()) {
<div class="global-auth-loader" id="main-content" tabindex="-1" role="status" aria-live="polite">
  <div class="loader-content">
    <viking-spinner [size]="80" [branded]="true" label="Securing your session" />
    <p class="loader-text">Securing your session...</p>
  </div>
</div>
} @else {
<div class="app-layout">
  <!-- Navbar -->
  <app-navbar></app-navbar>

  <viking-app-layout
    [hasSidebar]="isDashboardPage()"
    [sidebarCollapsible]="true"
    [autoOpenSidebar]="true"
  >
    @if (isDashboardPage()) {
    <app-sidebar vikingAppLayoutSidebar></app-sidebar>
    } @if (isDashboardPage()) {
    <main vikingAppLayoutContent class="dashboard-content" id="main-content" tabindex="-1">
      <router-outlet />
    </main>
    } @if (!isDashboardPage()) {
    <main vikingAppLayoutContent class="main-content" id="main-content" tabindex="-1">
      <router-outlet />
    </main>
    }
  </viking-app-layout>

  <!-- Footer -->
  <app-footer ngSkipHydration></app-footer>

  <!-- Issue Reporter FAB -->
  <app-issue-reporter ngSkipHydration></app-issue-reporter>
  <app-confirm-dialog />
  <app-onboarding-wizard />
  <app-command-palette />
  <viking-toaster />
</div>
}
