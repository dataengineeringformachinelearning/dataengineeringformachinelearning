@if (!authService.isInitialized()) {
<div class="global-auth-loader">
  <div class="loader-content">
    <img
      class="loader-logo"
      src="/data-engineering-for-machine-learning.svg"
      alt="Data Engineering for Machine Learning"
    />
    <div class="premium-spinner"></div>
    <p class="loader-text">Securing your session...</p>
  </div>
</div>
} @else {
<!-- Navbar -->
<app-navbar></app-navbar>

@if (isDashboardPage()) {
<div class="dashboard-wrapper">
  <app-sidebar></app-sidebar>
  <div class="dashboard-content">
    <router-outlet />
  </div>
</div>
} @else {
<!-- Main Content -->
<main class="main-content">
  <router-outlet />
</main>
}

<!-- Footer -->
<app-footer ngSkipHydration></app-footer>

<!-- Issue Reporter FAB -->
<app-issue-reporter ngSkipHydration></app-issue-reporter>
<!-- Cookie Consent Banner -->
<app-cookie-banner ngSkipHydration></app-cookie-banner>
}
