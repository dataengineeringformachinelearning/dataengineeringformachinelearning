@if (!authService.isInitialized()) {
<div class="global-auth-loader">
  <div class="loader-content">
    <mat-icon class="brand-icon loader-logo glowing-icon-sm" aria-hidden="true">analytics</mat-icon>
    <div class="premium-spinner"></div>
    <p class="loader-text">Securing your session...</p>
  </div>
</div>
} @else {
<!-- Navbar -->
<app-navbar></app-navbar>

@if (isDashboardPage()) {
<div class="dashboard-wrapper">
  <app-sidebar></app-sidebar>
  <main id="main-content" class="dashboard-content" role="main" tabindex="-1">
    <router-outlet />
  </main>
</div>
} @else {
<!-- Main Content -->
<div id="main-content-alt" class="main-content" [attr.role]="'main'" tabindex="-1">
  <router-outlet />
</div>
}

<!-- Footer -->
<app-footer ngSkipHydration></app-footer>

<!-- Issue Reporter FAB -->
<app-issue-reporter ngSkipHydration></app-issue-reporter>
<!-- Cookie Consent Banner -->
<app-cookie-banner ngSkipHydration></app-cookie-banner>
}
