@if (isAuthStatusPage()) {
<router-outlet />
} @else {
<div class="app-layout">
  <!-- Navbar -->
  <app-navbar></app-navbar>

  <viking-app-layout
    [hasSidebar]="isDashboardPage()"
    [sidebarCollapsible]="true"
    [autoOpenSidebar]="true"
  >
    @if (isDashboardPage()) {
    <app-sidebar vikingAppLayoutSidebar></app-sidebar>
    }
    <main
      vikingAppLayoutContent
      id="main-content"
      tabindex="-1"
      [class.dashboard-content]="isDashboardPage()"
      [class.main-content]="!isDashboardPage()"
    >
      <router-outlet />
    </main>
  </viking-app-layout>

  <!-- Footer -->
  <app-footer></app-footer>

  <!-- Deferred chrome — keeps the critical shell lean on first paint -->
  @defer (on idle) {
  <app-issue-reporter></app-issue-reporter>
  <app-confirm-dialog />
  <app-onboarding-wizard />
  <app-command-palette />
  }
  <viking-toaster />
</div>
}
