@if (!authService.isInitialized() || authService.isProcessing()) {
<div class="global-auth-loader">
  <div class="loader-content">
    <img
      class="loader-logo"
      src="/data-engineering-for-machine-learning.svg"
      alt="Data Engineering for Machine Learning"
    />
    <div class="premium-spinner"></div>
    <p class="loader-text">Securing your session...</p>
  </div>
</div>
} @if (authService.isInitialized() && !authService.isProcessing()) {
<!-- Navbar -->
<app-navbar></app-navbar>
<!-- Main Content -->
<main class="main-content">
  <router-outlet />
</main>
<!-- Footer -->
<app-footer></app-footer>
<!-- Issue Reporter FAB -->
<app-issue-reporter></app-issue-reporter>
<!-- Cookie Consent Banner -->
<app-cookie-banner></app-cookie-banner>
}
