@if (!authService.isInitialized()) {
<div class="global-auth-loader" id="main-content" tabindex="-1">
  <div class="loader-content">
    <deml-brand-logo hostClass="brand-icon loader-logo glowing-icon-sm" />
    <div class="premium-spinner"></div>
    <p class="loader-text">Securing your session...</p>
  </div>
</div>
} @else {
<div class="app-layout" ngSkipHydration>
  <!-- Navbar -->
  <app-navbar></app-navbar>

  @if (isDashboardPage()) {
  <div class="dashboard-wrapper">
    <app-sidebar></app-sidebar>
    <div class="dashboard-content" id="main-content" tabindex="-1">
      <router-outlet />
    </div>
  </div>
  } @else {
  <!-- Main Content -->
  <div class="main-content" id="main-content" tabindex="-1">
    <router-outlet />
  </div>
  }

  <!-- Footer -->
  <app-footer ngSkipHydration></app-footer>

  <!-- Issue Reporter FAB -->
  <app-issue-reporter ngSkipHydration></app-issue-reporter>
  <!-- Cookie Consent Banner -->
  <app-cookie-banner ngSkipHydration></app-cookie-banner>
  <app-confirm-dialog />
  <app-search-dialog />
  <app-onboarding-wizard />
  <viking-toaster />
</div>
}
