@if (data(); as dialogData) {
<viking-modal [open]="open()" [heading]="heading()" (openChange)="onOpenChange($event)">
  <div class="confirm-body">
    <div class="title-row" style="display:flex; align-items:center; gap: var(--viking-space-2,16px);">
      <viking-icon [name]="iconName()" [size]="24" />
      <viking-text>{{ dialogData.message }}</viking-text>
    </div>

    @if (dialogData.type === 'prompt' && dialogData.confirmText) {
    <viking-field
      label="Verification text"
      [description]="'Type ' + dialogData.confirmText + ' to proceed'"
    >
      <viking-input
        [ngModel]="inputValue()"
        (ngModelChange)="inputValue.set($event)"
        autocomplete="off"
        (keyup.enter)="onConfirm()"
      />
    </viking-field>
    }
  </div>

  <div vikingModalActions>
    @if (dialogData.type !== 'alert') {
    <viking-button variant="outline" (pressed)="onCancel()">Cancel</viking-button>
    }
    <viking-button
      [variant]="dialogData.confirmBtnColor === 'warn' ? 'danger' : 'primary'"
      [disabled]="!isValid()"
      [icon]="dialogData.type === 'alert' ? 'check-circle' : dialogData.confirmBtnColor === 'warn' ? 'trash' : 'check'"
      (pressed)="onConfirm()"
    >
      {{ dialogData.confirmBtnText || (dialogData.type === 'alert' ? 'OK' : 'Confirm') }}
    </viking-button>
  </div>
</viking-modal>
}
