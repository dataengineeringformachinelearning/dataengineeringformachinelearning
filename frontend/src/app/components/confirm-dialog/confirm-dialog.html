@if (data(); as dialogData) {
<flux-modal [open]="open()" [heading]="heading()" (openChange)="onOpenChange($event)">
  <div class="confirm-body">
    <div class="title-row">
      <flux-icon [name]="iconName()" [size]="24" />
      <flux-text>{{ dialogData.message }}</flux-text>
    </div>

    @if (dialogData.type === 'prompt' && dialogData.confirmText) {
    <flux-field
      label="Verification text"
      [description]="'Type ' + dialogData.confirmText + ' to proceed'"
    >
      <flux-input
        [ngModel]="inputValue()"
        (ngModelChange)="inputValue.set($event)"
        autocomplete="off"
        (keyup.enter)="onConfirm()"
      />
    </flux-field>
    }
  </div>

  <div fluxModalActions>
    @if (dialogData.type !== 'alert') {
    <flux-button variant="ghost" icon="x" (pressed)="onCancel()">Cancel</flux-button>
    }
    <flux-button
      [variant]="dialogData.confirmBtnColor === 'warn' ? 'danger' : 'primary'"
      [disabled]="!isValid()"
      [icon]="dialogData.type === 'alert' ? 'check-circle' : dialogData.confirmBtnColor === 'warn' ? 'trash' : 'check'"
      (pressed)="onConfirm()"
    >
      {{ dialogData.confirmBtnText || (dialogData.type === 'alert' ? 'OK' : 'Confirm') }}
    </flux-button>
  </div>
</flux-modal>
}
