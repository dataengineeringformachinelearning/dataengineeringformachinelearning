<div class="endpoints-table-container" *ngIf="isBrowser">
  <ag-grid-angular
    class="ag-theme-alpine"
    [rowData]="rowData"
    [columnDefs]="columnDefs"
    [defaultColDef]="defaultColDef"
    rowSelection="multiple"
    (gridReady)="onGridReady($event)"
    (selectionChanged)="onSelectionChangedEvent($event)">
  </ag-grid-angular>
</div>
