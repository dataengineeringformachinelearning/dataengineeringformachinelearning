<flux-fab icon="alert-triangle" label="Report Issue" (pressed)="toggleModal()" />

<flux-modal [open]="isOpen()" (openChange)="isOpen.set($event)" heading="Report an Issue">
  <flux-text>
    Describe what went wrong. Diagnostic info (like recent errors) will be automatically attached to
    assist in resolving the issue.
  </flux-text>

  <flux-textarea
    [ngModel]="issueDescription()"
    (ngModelChange)="issueDescription.set($event)"
    placeholder="E.g., The chart failed to load when the refresh button was clicked..."
    [rows]="5"
    [disabled]="isSubmitting()"
    label="Issue description"
  />

  @if (submissionStatus() === 'success') {
  <flux-callout tone="success" heading="Issue reported successfully!" />
  } @if (submissionStatus() === 'error') {
  <flux-callout tone="danger" heading="Failed to report issue. Please try again." />
  }

  <div fluxModalActions>
    <flux-button variant="ghost" icon="x" [disabled]="isSubmitting()" (pressed)="toggleModal()">
      Cancel
    </flux-button>
    <flux-button
      variant="primary"
      icon="send"
      [loading]="isSubmitting()"
      [disabled]="!issueDescription().trim()"
      (pressed)="submitIssue()"
    >
      Submit
    </flux-button>
  </div>
</flux-modal>
