<viking-fab icon="alert-triangle" label="Report Issue" (pressed)="toggleModal()" />

<viking-modal [open]="isOpen()" (openChange)="isOpen.set($event)" heading="Report an Issue">
  <viking-text>
    Describe what went wrong. Diagnostic info (like recent errors) will be automatically attached to
    assist in resolving the issue.
  </viking-text>

  <viking-textarea
    [ngModel]="issueDescription()"
    (ngModelChange)="issueDescription.set($event)"
    placeholder="E.g., The chart failed to load when the refresh button was clicked..."
    [rows]="5"
    [disabled]="isSubmitting()"
    label="Issue description"
  />

  @if (submissionStatus() === 'success') {
  <viking-callout tone="success" heading="Issue reported successfully!" />
  } @if (submissionStatus() === 'error') {
  <viking-callout tone="danger" heading="Failed to report issue. Please try again." />
  }

  <viking-button
    vikingModalActions
    variant="outline"
    [disabled]="isSubmitting()"
    (pressed)="toggleModal()"
  >
    Cancel
  </viking-button>
  <viking-button
    vikingModalActions
    variant="primary"
    icon="send"
    [loading]="isSubmitting()"
    [disabled]="!issueDescription().trim()"
    (pressed)="submitIssue()"
  >
    Submit
  </viking-button>
</viking-modal>
