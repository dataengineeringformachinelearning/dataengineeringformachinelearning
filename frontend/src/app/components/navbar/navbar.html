<mat-toolbar class="navbar">
  <a routerLink="/" class="navbar-brand">
    <img
      class="logo"
      src="/data-engineering-for-machine-learning.svg"
      alt="Data Engineering for Machine Learning"
      style="height: 40px; margin-right: 10px; margin-top: 5px;"
    />
  </a>
  <span class="spacer" style="flex: 1 1 auto;"></span>
  <div class="nav-links">
    <a mat-button routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}">Home</a>
    <a mat-button routerLink="/dashboard" routerLinkActive="active">Dashboard</a>
    <button mat-button *ngIf="!authService.isAuthenticated()" (click)="login()">Sign In</button>
    <button mat-button *ngIf="authService.isAuthenticated()" (click)="logout()">Sign Out</button>
  </div>
</mat-toolbar>
