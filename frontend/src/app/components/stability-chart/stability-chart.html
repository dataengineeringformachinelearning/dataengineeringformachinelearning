<mat-card appearance="outlined" class="chart-widget">
  <mat-card-header>
    <mat-card-title>Application Stability</mat-card-title>
    <mat-card-subtitle>Status Codes Over Time</mat-card-subtitle>
  </mat-card-header>
  <mat-card-content>
    @if (isBrowser) {
      <ag-charts [options]="chartOptions"></ag-charts>
    }
  </mat-card-content>
</mat-card>
