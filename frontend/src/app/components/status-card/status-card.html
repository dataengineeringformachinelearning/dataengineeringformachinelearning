<viking-card class="status-card-outlined" [id]="page.slug">
  <viking-card-header>
    <div class="header-main-info">
      <div class="card-title-row">
        <viking-heading [level]="2" size="xl" class="card-title">{{ page.title }}</viking-heading>
        <app-pro-verified-badge [show]="!!page.is_pro_verified"></app-pro-verified-badge>
      </div>
      <p class="card-subtitle">{{ page.description || 'Monitoring core services' }}</p>
    </div>

    @if (linkHeader) {
    <a
      [routerLink]="['/status', page.slug]"
      class="status-badge-premium"
      [ngClass]="getPageStatusClass()"
    >
      <span class="status-dot" aria-hidden="true"></span>
      {{ getPageStatus() }}
    </a>
    } @else {
    <div class="status-badge-premium" [ngClass]="getPageStatusClass()">
      <span class="status-dot" aria-hidden="true"></span>
      {{ getPageStatus() }}
    </div>
    }
  </viking-card-header>

  <div class="ml-stat-panels-row">
    <viking-status-metric-row
      icon="server"
      title="Cumulative SLA"
      subtitle="Based on real telemetry"
      [value]="((page.cumulative_sla ?? 0) | number:'1.2-2') + '%'"
    />
    <viking-status-metric-row
      icon="trending-up"
      title="Predicted SLA"
      subtitle="30-day forecast via ML"
      [value]="((predictedSla ?? 0) | number:'1.2-2') + '%'"
    />
  </div>

  <viking-card class="ml-stat-panels-row status-card-extracted-1" [compact]="true">
    <viking-status-metric-row
      icon="clock"
      title="P99 Latency"
      subtitle="Last 24h"
      [value]="p99Latency != null ? p99Latency + 'ms' : 'N/A'"
    />
    <viking-status-metric-row
      icon="bar-chart"
      title="Total Requests"
      subtitle="Last 24h"
      [value]="totalRequestsValue"
    />
  </viking-card>

  <viking-card class="ml-stat-panels-row status-card-extracted-1" [compact]="true">
    <viking-status-metric-row
      icon="shield"
      title="Cumulative TA"
      subtitle="Based on real telemetry"
      [value]="(((threatReport ? threatReport.suspicious_ratio : simulatedThreatReport?.suspicious_ratio) || 0) * 100 | number:'1.1-2') + '%'"
    />
    <viking-status-metric-row
      icon="trending-up"
      title="Predicted TA"
      subtitle="30-day threat forecast via ML"
      [value]="(((threatReport ? threatReport.anomaly_score : simulatedThreatReport?.anomaly_score) || 0) * 100 | number:'1.1-2') + '%'"
    />
  </viking-card>

  @if (showViewButton) {
  <div class="view-btn-container">
    <viking-button
      variant="primary"
      [fullWidth]="true"
      [href]="'/status/' + page.slug"
      iconTrailing="arrow-right"
    >
      View Dedicated Page
    </viking-button>
  </div>
  }
</viking-card>
