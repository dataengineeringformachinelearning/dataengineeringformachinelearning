<viking-status-card
  [attr.id]="page.slug"
  [title]="page.title"
  [subtitle]="page.description || 'Monitoring core services'"
  [status]="getPageStatus()"
  [statusTone]="statusTone"
  [statusDot]="true"
  [href]="linkHeader ? getPageUrl() : ''"
>
  <div class="status-card-actions">
    <app-pro-verified-badge [show]="!!page.is_pro_verified"></app-pro-verified-badge>
    <viking-status-pill [tone]="statusTone" [dot]="true">{{ getPageStatus() }}</viking-status-pill>
  </div>

  <div class="status-summary-grid">
    <viking-status-metric-row
      icon="server"
      title="Cumulative SLA"
      subtitle="Based on real telemetry"
      [value]="(cumulativeSla | number:'1.2-2') + '%'"
    />
    <viking-status-metric-row
      icon="trending-up"
      title="Predicted SLA"
      subtitle="30-day forecast via ML"
      [value]="(predictedSlaValue | number:'1.2-2') + '%'"
    />
  </div>

  <div class="status-summary-grid">
    <viking-status-metric-row
      icon="clock"
      title="P99 Latency"
      subtitle="Last 24h"
      [value]="p99Latency + 'ms'"
    />
    <viking-status-metric-row
      icon="bar-chart"
      title="Total Requests"
      subtitle="Last 24h"
      [value]="(totalRequests | number) ?? '0'"
    />
  </div>

  <div class="status-summary-grid">
    <viking-status-metric-row
      icon="shield"
      title="Cumulative TA"
      subtitle="Based on real telemetry"
      [value]="(suspiciousRatio * 100 | number:'1.1-2') + '%'"
    />
    <viking-status-metric-row
      icon="trending-up"
      title="Predicted TA"
      subtitle="30-day threat forecast via ML"
      [value]="(anomalyScore * 100 | number:'1.1-2') + '%'"
    />
  </div>

  <div class="status-summary-grid status-summary-grid-single">
    <viking-status-metric-row
      icon="trending-up"
      title="Temporal Forecast"
      subtitle="Norse SNN spike risk (0-100)"
      [value]="(predictedTemporalForecastValue | number:'1.1-2') ?? '0'"
    />
  </div>

  @if (showIncidents && activeIncidents.length > 0) {
  <div class="status-incidents-list">
    @for (incident of activeIncidents; track incident.id || incident.title) {
    <viking-card [compact]="true">
      <strong>{{ incident.status }}</strong>
      <span>{{ incident.title }}</span>
      <small>{{ incident.message }}</small>
    </viking-card>
    }
  </div>
  } @if (showViewButton) {
  <div class="status-card-footer-action">
    <viking-button
      variant="primary"
      [fullWidth]="true"
      [href]="getPageUrl()"
      iconTrailing="arrow-right"
    >
      View Dedicated Page
    </viking-button>
  </div>
  }
</viking-status-card>
