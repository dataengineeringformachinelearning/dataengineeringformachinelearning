<div class="unified-select-container">
  @if (label) {
    <label [htmlFor]="id" class="unified-select-label">
      {{ label }}
    </label>
  }

  <div class="unified-select-wrapper">
    <button
      [id]="id"
      type="button"
      class="unified-select-trigger"
      [class.disabled]="disabled"
      [attr.aria-haspopup]="'listbox'"
      [attr.aria-expanded]="isOpen"
      [attr.aria-label]="label ? null : 'Select an option'"
      (click)="toggleOpen()"
      (keydown)="onKeyDown($event)"
    >
      <span class="unified-select-text">{{ selectedLabel }}</span>
      <span class="unified-select-icon">
        <mat-icon class="unified-select-caret">expand_more</mat-icon>
      </span>
    </button>

    @if (isOpen) {
      <ul
        class="unified-select-dropdown"
        role="listbox"
        aria-label="{{ label || 'Select an option' }}"
      >
        @for (option of options; track option.value) {
          <li
            class="unified-select-option"
            [class.selected]="option.value === value"
            role="option"
            [attr.aria-selected]="option.value === value"
            (click)="selectOption(option)"
          >
            <span class="unified-select-option-text">{{ option.label }}</span>
            @if (option.value === value) {
              <span class="unified-select-check">
                <mat-icon class="check-icon" style="font-size: 18px; width: 18px; height: 18px"
                  >check</mat-icon
                >
              </span>
            }
          </li>
        }
      </ul>
    }
  </div>
</div>
