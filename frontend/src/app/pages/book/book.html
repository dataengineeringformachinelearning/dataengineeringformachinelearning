<div
  class="dashboard-page-container"
  (touchstart)="onTouchStart($event)"
  (touchend)="onTouchEnd($event)"
>
  <!-- Glow Spheres for Homepage Unity -->
  <div class="dashboard-content-area">
    <div class="content-wrapper full-width">
      <header class="hud-header">
        <div class="title-group">
          <div class="section-tag-row">
            <span class="section-tag">Resource Center</span>
          </div>
          <h1 class="hud-title">Documentation</h1>
          <p class="hud-subtitle">Interactive guide, working notes, and reference material</p>
        </div>
      </header>

      <!-- Reading Progress Bar -->
      <div class="progress-bar-header grid-layout">
        <span class="progress-label col-span-2 col-span-md-6">Reading Progress</span>
        <span class="progress-percentage col-span-2 col-span-md-6 text-right"
          >{{ bookService.progress() }}%</span
        >
      </div>
      <div class="progress-bar-container">
        <div class="progress-bar-fill" [style.width.%]="bookService.progress()"></div>
      </div>

      <!-- Page Card -->
      <div class="grid-layout">
        <div class="status-card-outlined book-card col-span-4 col-span-md-12">
          <div class="card-body-clean book-body">
            <div class="page-transition-container">
              <app-page [data]="bookService.activeChapter().content || ''"></app-page>
            </div>
          </div>
        </div>
      </div>

      <!-- Pagination Controls -->
      <div
        class="pagination-controls-outlined"
        (click)="bookService.scrollToTop()"
        tabindex="0"
        (keydown.enter)="bookService.scrollToTop()"
      >
        <button
          mat-flat-button
          class="pagination-btn"
          [disabled]="bookService.activePageIndex() === 0"
          (click)="bookService.prevPage()"
        >
          <mat-icon>chevron_left</mat-icon>
          Previous
        </button>
        <span class="page-counter">
          Chapter {{ bookService.activePageIndex() + 1 }} of {{ bookService.chapters().length }}
        </span>
        <button
          mat-flat-button
          class="pagination-btn"
          [disabled]="bookService.activePageIndex() === bookService.chapters().length - 1"
          (click)="bookService.nextPage()"
        >
          Next
          <mat-icon>chevron_right</mat-icon>
        </button>
      </div>
    </div>
  </div>
</div>
