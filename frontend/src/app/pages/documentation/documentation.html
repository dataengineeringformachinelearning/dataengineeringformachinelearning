<div class="dashboard-page-container">
  <div class="dashboard-content-area">
    <div class="page-inner-wrapper">
      <section class="docs-outbound-card" aria-labelledby="docs-outbound-title">
        <div class="docs-outbound-icon" aria-hidden="true">
          <mat-icon>open_in_new</mat-icon>
        </div>
        <span class="section-tag">Documentation</span>
        <h1 id="docs-outbound-title">Developer docs live on the marketing site</h1>
        <p>
          API Gateway & Integrations content now has one canonical home, including quick start,
          inference, ingestion, and security examples.
        </p>
        <a class="docs-outbound-button" [href]="marketingDocsUrl" rel="noopener noreferrer">
          <mat-icon aria-hidden="true">article</mat-icon>
          <span>Open Documentation</span>
        </a>
      </section>
    </div>
  </div>
</div>
