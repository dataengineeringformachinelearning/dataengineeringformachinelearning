<div class="dashboard-container not-found-container">
  <flux-card class="not-found-card" id="not-found-card">
    <flux-heading [level]="1" size="xl" class="error-code">404</flux-heading>
    <flux-heading [level]="2" size="lg" class="error-title">Page Not Found</flux-heading>
    <flux-text variant="muted" class="error-message">
      The page you are looking for might have been removed, had its name changed, or is temporarily
      unavailable.
    </flux-text>
    <div class="action-box">
      <flux-button variant="primary" href="/" id="not-found-home-btn">Return to Home</flux-button>
    </div>
  </flux-card>
</div>
