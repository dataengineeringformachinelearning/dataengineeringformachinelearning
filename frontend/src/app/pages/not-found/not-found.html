<div class="dashboard-container not-found-container">
  <viking-card class="not-found-card" id="not-found-card">
    <viking-heading [level]="1" size="xl" class="error-code">404</viking-heading>
    <viking-heading [level]="2" size="lg" class="error-title">Page Not Found</viking-heading>
    <viking-text variant="muted" class="error-message">
      The page you are looking for might have been removed, had its name changed, or is temporarily
      unavailable.
    </viking-text>
    <div class="action-box">
      <viking-button variant="primary" href="/" id="not-found-home-btn"
        >Return to Home</viking-button
      >
    </div>
  </viking-card>
</div>
