[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "deml-crypto"
version = "0.1.0"
description = "AES-256-GCM + GCP KMS envelope encryption with DEK rotation for DEML Platform"
readme = "README.md"
license = "MIT"
license-files = ["LICENSE"]
requires-python = ">=3.10"
authors = [
    { name = "Joe Alongi", email = "joe@dataengineeringformachinelearning.com" }
]
keywords = ["encryption", "kms", "gcp", "aes", "gcm", "envelope", "crypto"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Security :: Cryptography",
]

dependencies = [
    "cryptography>=41.0.0",
    "google-cloud-kms>=3.0.0; extra == 'gcp'",
]

[project.optional-dependencies]
gcp = ["google-cloud-kms>=3.0.0"]
dev = ["pytest>=7.0.0", "ruff>=0.4.0"]

[project.urls]
Homepage = "https://dataengineeringformachinelearning.com"
Documentation = "https://dataengineeringformachinelearning.com/documentation"
Repository = "https://github.com/dataengineeringformachinelearning/dataengineeringformachinelearning"
Issues = "https://github.com/dataengineeringformachinelearning/dataengineeringformachinelearning/issues"

[tool.hatch.build.targets.wheel]
packages = ["src/deml_crypto"]

[tool.ruff]
target-version = "py310"
line-length = 100

[tool.ruff.lint]
select = ["E", "W", "F", "I", "UP"]
