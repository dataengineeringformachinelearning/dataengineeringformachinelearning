[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "deml-event-client"
version = "0.1.0"
description = "Redpanda/Kafka client with outbox patterns for DEML Platform event-driven architecture"
readme = "README.md"
license = "MIT"
license-files = ["LICENSE"]
requires-python = ">=3.10"
authors = [
    { name = "Joe Alongi", email = "joe@dataengineeringformachinelearning.com" }
]
keywords = ["kafka", "redpanda", "events", "messaging", "outbox", "pubsub"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: System :: Distributed Computing",
]

dependencies = [
    "confluent-kafka>=2.3.0",
]

[project.optional-dependencies]
dev = ["pytest>=7.0.0", "ruff>=0.4.0"]

[project.urls]
Homepage = "https://dataengineeringformachinelearning.com"
Documentation = "https://dataengineeringformachinelearning.com/documentation"
Repository = "https://github.com/dataengineeringformachinelearning/dataengineeringformachinelearning"

[tool.hatch.build.targets.wheel]
packages = ["src/deml_event_client"]

[tool.ruff]
target-version = "py310"
line-length = 100
