[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "deml-rate-limit"
version = "0.1.0"
description = "Dragonfly/Redis sliding window rate limiting for DEML Platform"
readme = "README.md"
license = "MIT"
license-files = ["LICENSE"]
requires-python = ">=3.10"
authors = [
    { name = "Joe Alongi", email = "joe@dataengineeringformachinelearning.com" }
]
keywords = ["rate-limit", "redis", "dragonfly", "sliding-window", "security"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
]

dependencies = [
    "redis>=5.0.0",
]

[project.optional-dependencies]
dev = ["pytest>=7.0.0", "ruff>=0.4.0"]

[project.urls]
Homepage = "https://dataengineeringformachinelearning.com"
Documentation = "https://dataengineeringformachinelearning.com/documentation"
Repository = "https://github.com/dataengineeringformachinelearning/dataengineeringformachinelearning"
Issues = "https://github.com/dataengineeringformachinelearning/dataengineeringformachinelearning/issues"

[tool.hatch.build.targets.wheel]
packages = ["src/deml_rate_limit"]

[tool.ruff]
target-version = "py310"
line-length = 100

[tool.ruff.lint]
select = ["E", "W", "F", "I", "UP"]
