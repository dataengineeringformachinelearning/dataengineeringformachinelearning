[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "deml-storage"
version = "0.1.0"
description = "S3-compatible object storage abstraction for DEML Platform (RustFS, S3)"
readme = "README.md"
license = "MIT"
license-files = ["LICENSE"]
requires-python = ">=3.10"
authors = [
    { name = "Joe Alongi", email = "joe@dataengineeringformachinelearning.com" }
]
keywords = ["storage", "s3", "rustfs", "object-storage", "cloud-storage"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11", 
    "Programming Language :: Python :: 3.12",
]

dependencies = [
    "boto3>=1.34.0",
]

[project.optional-dependencies]
dev = ["pytest>=7.0.0", "ruff>=0.4.0"]

[project.urls]
Homepage = "https://dataengineeringformachinelearning.com"
Repository = "https://github.com/dataengineeringformachinelearning/dataengineeringformachinelearning"

[tool.hatch.build.targets.wheel]
packages = ["src/deml_storage"]

[tool.ruff]
target-version = "py310"
line-length = 100
