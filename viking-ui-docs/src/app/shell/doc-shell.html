<div class="doc-shell">
  <aside class="doc-sidebar" aria-label="Documentation navigation">
    <a class="doc-sidebar-brand" routerLink="/">
      <span class="doc-brand-mark" aria-hidden="true"></span>
      <span class="doc-brand-name">Viking-UI</span>
    </a>

    <nav class="doc-sidebar-group">
      <span class="doc-sidebar-label">Getting Started</span>
      <a
        class="doc-sidebar-link"
        routerLink="/"
        routerLinkActive="is-active"
        [routerLinkActiveOptions]="{ exact: true }"
      >
        Introduction
      </a>
      <a
        class="doc-sidebar-link"
        routerLink="/components"
        routerLinkActive="is-active"
        >Components</a
      >
    </nav>

    <nav
      class="doc-sidebar-group doc-sidebar-group--sections"
      aria-label="Component sections"
    >
      <span class="doc-sidebar-label">On this page</span>
      @for (section of navSections; track section.id) {
      <a
        class="doc-sidebar-link doc-sidebar-link--anchor"
        href="/components#{{ section.id }}"
        (click)="scrollToCategory($event, section.id)"
      >
        {{ section.label }}
      </a>
      }
    </nav>

    <div class="doc-sidebar-footer">
      <a class="doc-sidebar-cta" routerLink="/components">Browse components</a>
    </div>
  </aside>

  <div class="doc-main">
    <router-outlet />
  </div>
</div>
