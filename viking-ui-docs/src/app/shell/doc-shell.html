<div class="viking-docs-app">
  <viking-site-navbar
    context="marketing"
    [theme]="theme()"
    (themeToggle)="toggleTheme()"
  />

  <div class="doc-shell dashboard-wrapper">
    <viking-app-sidebar [width]="280">
      <aside class="dashboard-sidebar doc-sidebar">
        <a
          class="sidebar-brand doc-sidebar-brand"
          routerLink="/"
          aria-label="Viking-UI home"
        >
          <viking-icon
            name="drakkar"
            [size]="28"
            color="accent"
            class="brand-icon navbar-logo"
          />
          <span class="doc-brand-name">Viking-UI</span>
        </a>

        <div class="sidebar-scroll-container">
          <nav class="sidebar-nav" aria-label="Documentation navigation">
            <a
              class="nav-item"
              routerLink="/"
              routerLinkActive="active"
              [routerLinkActiveOptions]="{ exact: true }"
            >
              Introduction
            </a>
            <a
              class="nav-item"
              routerLink="/components"
              routerLinkActive="active"
            >
              Components
            </a>
          </nav>

          <nav class="nav-tree-section" aria-label="Component sections">
            <div class="nav-tree-header">On this page</div>
            <div class="nav-tree-children">
              @for (section of navSections; track section.id) {
              <a
                class="tree-child-item"
                href="/components#{{ section.id }}"
                (click)="scrollToCategory($event, section.id)"
              >
                {{ section.label }}
              </a>
              }
            </div>
          </nav>
        </div>

        <footer class="sidebar-footer doc-sidebar-footer">
          <viking-button
            variant="primary"
            [fullWidth]="true"
            (pressed)="browseComponents()"
          >
            Browse components
          </viking-button>
        </footer>
      </aside>
    </viking-app-sidebar>

    <main class="doc-main dashboard-content" id="main-content" tabindex="-1">
      <router-outlet />
    </main>
  </div>

  <app-toast-outlet />
</div>
