<div class="doc-shell">
  <aside class="doc-sidebar" aria-label="Documentation navigation">
    <a class="doc-sidebar-brand" routerLink="/">
      <viking-brand name="Viking-UI" />
    </a>

    <nav class="doc-sidebar-group">
      <viking-text variant="muted" class="doc-sidebar-label"
        >Getting Started</viking-text
      >
      <a
        class="doc-sidebar-link"
        routerLink="/"
        routerLinkActive="is-active"
        [routerLinkActiveOptions]="{ exact: true }"
      >
        Introduction
      </a>
      <a
        class="doc-sidebar-link"
        routerLink="/components"
        routerLinkActive="is-active"
        >Components</a
      >
    </nav>

    <nav
      class="doc-sidebar-group doc-sidebar-group--sections"
      aria-label="Component sections"
    >
      <viking-text variant="muted" class="doc-sidebar-label"
        >On this page</viking-text
      >
      @for (section of navSections; track section.id) {
      <a
        class="doc-sidebar-link doc-sidebar-link--anchor"
        href="/components#{{ section.id }}"
        (click)="scrollToCategory($event, section.id)"
      >
        {{ section.label }}
      </a>
      }
    </nav>

    <div class="doc-sidebar-footer">
      <viking-button
        variant="primary"
        icon="download"
        href="/components"
        [fullWidth]="true"
      >
        Browse components
      </viking-button>
    </div>
  </aside>

  <div class="doc-main">
    <router-outlet />
  </div>
</div>
