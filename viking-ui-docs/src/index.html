    <meta charset="utf-8" />
    <title>Viking-UI — Angular Component Library</title>
    <base href="/" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="Viking-UI documentation — zero-dependency Angular components themed with THEME.md tokens. Install @dataengineeringformachinelearning/viking-ui from npm."
    />
    <meta name="color-scheme" content="light dark" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link
      rel="preload"
      href="/assets/fonts/inter/InterVariable.woff2"
      as="font"
      type="font/woff2"
      crossorigin
    />
    <!-- nosemgrep: html.security.audit.missing-integrity.missing-integrity -->
    <link
      rel="canonical"
      href="https://ui.dataengineeringformachinelearning.com/"
    />
    <!-- pragma: allowlist secret -->
    <meta name="algolia-site-verification" content="687B59B29612DE68" />
    <script>
      (function () {
        var savedTheme = localStorage.getItem("theme");
        var theme = "dark";
        if (savedTheme === "light" || savedTheme === "dark") {
          theme = savedTheme;
        } else {
          theme = window.matchMedia("(prefers-color-scheme: dark)").matches
            ? "dark"
            : "light";
        }
        document.documentElement.setAttribute("data-theme", theme);
        document.documentElement.classList.toggle("dark", theme === "dark");
      })();
    </script>

    <!-- Google tag (gtag.js) — Viking-UI docs property -->
    <!-- nosemgrep: html.security.audit.missing-integrity.missing-integrity -->

      src="https://www.googletagmanager.com/gtag/js?id=G-JZ1MS7DNL2"
    ></script>

      window.dataLayer = window.dataLayer || [];
      function gtag() {
        dataLayer.push(arguments);
      }
      gtag("js", new Date());
      gtag("config", "G-JZ1MS7DNL2");
    </script>

        t.async = 1;

        y = l.getElementsByTagName(r)[0];
        y.parentNode.insertBefore(t, y);
      })(window, document, "clarity", "script", "xddv4klojn");
    </script>
  </head>
