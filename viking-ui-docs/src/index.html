<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Viking-UI — Angular Component Library</title>
    <base href="/" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="Viking-UI documentation — zero-dependency Angular components themed with THEME.md tokens. Install @dataengineeringformachinelearning/viking-ui from npm."
    />
    <meta name="color-scheme" content="light dark" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <script>
      (function () {
        var savedTheme = localStorage.getItem('theme');
        var theme = 'dark';
        if (savedTheme === 'light' || savedTheme === 'dark') {
          theme = savedTheme;
        } else {
          theme = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
        }
        document.documentElement.setAttribute('data-theme', theme);
        document.documentElement.classList.toggle('dark', theme === 'dark');
      })();
    </script>
  </head>
  <body>
    <app-root></app-root>
  </body>
</html>
